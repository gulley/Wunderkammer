<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wunderkammer — Stage Box Puppet</title>
<style>
  body {
    margin: 0;
    background: #0e0b08;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    /* Scale to fit the viewport while preserving the 640:520 aspect ratio.
       The three-way min covers: original size, viewport width, and the width
       that would make the canvas exactly 100vh tall at this aspect ratio. */
    width: min(640px, 100vw, calc(100vh * 640 / 520));
    height: auto;
    aspect-ratio: 640 / 520;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = 640;
canvas.height = 520;

// =============================================================================
// ROSTER
// =============================================================================

const CARD_H = 123;  // 112.5 % of original 110 px

function loadRosterEntry(src, gait) {
  const e = { img: new Image(), cardW: 60, cardH: CARD_H, gait };
  e.img.src = src;
  e.img.onload = () => {
    e.cardW = Math.round(CARD_H * e.img.naturalWidth / e.img.naturalHeight);
  };
  return e;
}

const ROSTER = [

  loadRosterEntry('assets/king.png', {
    bob:      a => -26 * Math.pow(Math.abs(Math.sin(2*a)), 0.45),
    waggle:   a => Math.sin(a * 2.0) * 0.09,
    cardTilt: a => -0.08 + Math.sin(a * 2.0) * 0.04,
  }),

  loadRosterEntry('assets/boney.png', {
    bob:      a => -(12 + 9 * Math.abs(Math.sin(a))) * Math.abs(Math.sin(2*a)),
    waggle:   a => Math.sin(a * 3.0) * 0.17 + Math.sin(a * 11.3) * 0.045,
    cardTilt: a => 0.10 + Math.sin(a * 3.0) * 0.09,
  }),

  loadRosterEntry('assets/spike.png', {
    bob:      a => -30 * Math.pow(Math.abs(Math.sin(2*a)), 1.7),
    waggle:   a => Math.sin(a * 2.0) * 0.15,
    cardTilt: a => 0.07 + Math.sin(a * 2.0) * 0.08,
  }),

  loadRosterEntry('assets/sol.png', {
    bob:      a => -7 * Math.abs(Math.sin(a)),
    waggle:   a => Math.sin(a * 1.0) * 0.05,
    cardTilt: a => Math.sin(a * 1.5) * 0.05,
  }),

  loadRosterEntry('assets/jester.png', {
    bob:      a => -22 * Math.abs(Math.sin(4*a)),
    waggle:   a => Math.sin(a * 4.0) * 0.19 + Math.sin(a * 7.0) * 0.06,
    cardTilt: a => Math.sin(a * 4.0) * 0.22,
  }),

  loadRosterEntry('assets/piper.png', {
    bob:      a => -18 * Math.abs(Math.sin(2*a)),
    waggle:   a => Math.sin(a * 2.0) * 0.07,
    cardTilt: a => 0.05 + Math.sin(a * 2.0) * 0.03,
  }),

  loadRosterEntry('assets/bromley.png', {
    bob:      a => -24 * Math.pow(Math.abs(Math.sin(2*a)), 0.55),
    waggle:   a => Math.sin(a * 2.0) * 0.13,
    cardTilt: a => Math.sin(a * 2.0) * 0.11,
  }),

  loadRosterEntry('assets/george.png', {
    bob:      a => -25 * Math.pow(Math.abs(Math.sin(2*a)), 1.4),
    waggle:   a => Math.sin(a * 2.0) * 0.08,
    cardTilt: a => -0.05 + Math.sin(a * 2.0) * 0.03,
  }),

];

// =============================================================================
// GEOMETRY  — wider stage, fills canvas width
// =============================================================================

const VP    = [320, 210];
const DEPTH = 0.32;

function lerp2(a, b, t) {
  return [a[0] + t*(b[0]-a[0]), a[1] + t*(b[1]-a[1])];
}

const fbl = [ 20, 448];  const fbr = [620, 448];
const ftl = [ 20, 393];  const ftr = [620, 393];
const btl = lerp2(ftl, VP, DEPTH);
const btr = lerp2(ftr, VP, DEPTH);
const bbl = lerp2(fbl, VP, DEPTH);
const bbr = lerp2(fbr, VP, DEPTH);

function topPt(s, t) {
  return [
    (1-s)*(1-t)*ftl[0] + s*(1-t)*ftr[0] + (1-s)*t*btl[0] + s*t*btr[0],
    (1-s)*(1-t)*ftl[1] + s*(1-t)*ftr[1] + (1-s)*t*btl[1] + s*t*btr[1],
  ];
}

// =============================================================================
// WOBBLY TRACK GENERATOR
// =============================================================================

function makeWobblyTrack() {
  const os = 0.38, ot = 0.32;
  const harms = [2, 3].map(n => ({
    n,
    as: (Math.random() - 0.5) * os * 0.50,
    at: (Math.random() - 0.5) * ot * 0.50,
    ps: Math.random() * Math.PI * 2,
    pt: Math.random() * Math.PI * 2,
  }));

  function rawS(a) {
    let s = 0.5 + os * Math.cos(a);
    for (const h of harms) s += h.as * Math.cos(h.n * a + h.ps);
    return s;
  }
  function rawT(a) {
    let t = 0.5 + ot * Math.sin(a);
    for (const h of harms) t += h.at * Math.sin(h.n * a + h.pt);
    return t;
  }

  const N_SAMP = 256;
  let sMin =  Infinity, sMax = -Infinity;
  let tMin =  Infinity, tMax = -Infinity;
  for (let i = 0; i < N_SAMP; i++) {
    const a = (i / N_SAMP) * Math.PI * 2;
    const s = rawS(a), t = rawT(a);
    if (s < sMin) sMin = s;  if (s > sMax) sMax = s;
    if (t < tMin) tMin = t;  if (t > tMax) tMax = t;
  }

  const MRG = 0.07;
  const sRng = sMax - sMin, tRng = tMax - tMin;
  return {
    pt(a) {
      const s = MRG + (rawS(a) - sMin) / sRng * (1 - 2*MRG);
      const t = MRG + (rawT(a) - tMin) / tRng * (1 - 2*MRG);
      return topPt(s, t);
    },
  };
}

// =============================================================================
// PERFORMANCE STATE
// =============================================================================

let perf = [];

function twoDistinctIndices(n) {
  const a = Math.floor(Math.random() * n);
  let b;
  do { b = Math.floor(Math.random() * n); } while (b === a);
  return [a, b];
}

function makeNewPair() {
  const [ia, ib] = twoDistinctIndices(ROSTER.length);
  return [ia, ib].map((idx, slot) => {
    const r = ROSTER[idx];
    return {
      img:      r.img,
      cardW:    r.cardW,
      cardH:    r.cardH,
      bob:      r.gait.bob,
      waggle:   r.gait.waggle,
      cardTilt: r.gait.cardTilt,
      track:    makeWobblyTrack(),
      angle:    slot * Math.PI,
    };
  });
}

// =============================================================================
// OPENING SEQUENCE STATE MACHINE
// =============================================================================

let openState = 'closed';
let openT     = 0;
const OPEN_DUR = 0.65;
const LID_OPEN_ANGLE = Math.PI * 0.58; // ~104° — clearly past vertical, inside faces viewer

function isEnabled(btn) {
  switch (openState) {
    case 'closed':  return btn === 'scene';
    case 'opening': return false;
    case 'open':    return btn === 'scene' || btn === 'pick';
    case 'playing': return true;
  }
  return false;
}

// =============================================================================
// CRANK + BUTTONS
// =============================================================================

const AXLE      = [ftr[0] - 54, (ftr[1] + fbr[1]) / 2];
const PICK_BTN  = [ftl[0] + 54, (ftl[1] + fbl[1]) / 2];
const SCENE_BTN = [(fbl[0] + fbr[0]) / 2, (ftl[1] + fbl[1]) / 2];
const HIT_R     = 50;
const SPEED     = 1.1;

let crankA  = 0;
let running = false;
let lastT   = null;

// =============================================================================
// CHARACTER TRANSITION
// =============================================================================

const TRANS_DUR  = 0.36;
const SLIDE_DIST = 155;   // px; enough to hide 75%-scale puppets below stage

let transPhase  = 'idle';
let transT      = 0;
let pendingPerf = null;

function easeIn(t)  { return t * t; }
function easeOut(t) { return 1 - (1-t)*(1-t); }

function currentYOffset() {
  if (transPhase === 'exiting')  return easeIn(transT)  * SLIDE_DIST;
  if (transPhase === 'entering') return (1 - easeOut(transT)) * SLIDE_DIST;
  return 0;
}

function currentAlpha() {
  if (transPhase === 'exiting')  return 1 - easeIn(transT);
  if (transPhase === 'entering') return easeOut(transT);
  return 1;
}

function startTransition() {
  if (transPhase !== 'idle') return;
  pendingPerf = makeNewPair();
  transPhase  = 'exiting';
  transT      = 0;
}

// =============================================================================
// BACKDROP
// =============================================================================

const BACKDROP_H  = 233;
const N_BACKDROPS = 2;
let   backdropIdx = 0;

const backdropImgs = ['assets/castle.png', 'assets/forest.png'].map(src => {
  const img = new Image();
  img.src = src;
  return img;
});

// =============================================================================
// STARS — scattered in the dark canvas area surrounding the stage box.
// Generated once; twinkling driven by sin(time) in drawStars().
// =============================================================================

const STARS = (() => {
  const backdropTop = btl[1] - BACKDROP_H;
  const bL = btl[0] - 16;
  const bR = btr[0] + 16;
  const stageBot = fbl[1] + 4;

  function rnd(a, b) { return a + Math.random() * (b - a); }
  function mk(x, y) {
    return { x, y, r: 0.4 + Math.random() * 1.1,
             ph: Math.random() * Math.PI * 2,
             sp: 0.6 + Math.random() * 1.4 };
  }

  const s = [];
  // Above the backdrop (full canvas width)
  for (let i = 0; i < 42; i++) s.push(mk(rnd(4, 636), rnd(4, backdropTop - 6)));
  // Flanking the backdrop / stage-top (narrow side margins)
  for (let i = 0; i < 5;  i++) s.push(mk(rnd(4, bL),        rnd(backdropTop, ftl[1])));
  for (let i = 0; i < 5;  i++) s.push(mk(rnd(bR, 636),      rnd(backdropTop, ftl[1])));
  // Below the stage
  for (let i = 0; i < 16; i++) s.push(mk(rnd(4, 636),       rnd(stageBot, 516)));
  return s;
})();

// Pre-baked grain texture: random stipple + short fiber strokes for rough wood feel.
const grainCanvas = (() => {
  const gc = document.createElement('canvas');
  gc.width = 640; gc.height = 520;
  const gx = gc.getContext('2d');
  const rnd = () => Math.random();
  // Fine stipple
  for (let i = 0; i < 18000; i++) {
    gx.fillStyle = `rgba(0,0,0,${0.04 + rnd() * 0.18})`;
    gx.fillRect(rnd() * 640, rnd() * 520, rnd() < 0.6 ? 1 : 1.5, 1);
  }
  // Short fiber strokes (mostly horizontal, slight angle variation)
  for (let i = 0; i < 2200; i++) {
    const x = rnd() * 640, y = rnd() * 520;
    const len = 3 + rnd() * 12;
    const angle = (rnd() - 0.5) * 0.4;
    gx.strokeStyle = `rgba(0,0,0,${0.04 + rnd() * 0.10})`;
    gx.lineWidth = 0.6 + rnd() * 0.6;
    gx.beginPath();
    gx.moveTo(x, y);
    gx.lineTo(x + Math.cos(angle) * len, y + Math.sin(angle) * len);
    gx.stroke();
  }
  return gc;
})();

// Overlay grain texture clipped to an arbitrary polygon.
function drawGrain(pts, alpha) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath(); ctx.clip();
  ctx.globalAlpha = alpha;
  ctx.globalCompositeOperation = 'multiply';
  ctx.drawImage(grainCanvas, 0, 0);
  ctx.restore();
}

// =============================================================================
// AUDIO — kalimba-like plucked tones (D Phrygian)
// =============================================================================

let audioCtx  = null;
let noteTimer = 0;
let tickTimer = 0;

// Fire a single soft tick: a brief noise burst filtered to a thin click.
function fireTick() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 3200; hp.Q.value = 0.8;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 7000; lp.Q.value = 0.5;
  const g  = audioCtx.createGain();
  g.gain.setValueAtTime(0.09, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.018);
  src.connect(hp); hp.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
  src.start(t0); src.stop(t0 + 0.04);
}

const KALIMBA_CORE = [293.66, 311.13, 349.23, 392.00, 440.00, 466.16, 523.25];
const KALIMBA_HIGH = [587.33, 622.25, 698.46, 783.99, 880.00];

function pluckNote(freq, vol, delay) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + (delay || 0);

  const osc1 = audioCtx.createOscillator(), gain1 = audioCtx.createGain();
  osc1.type = 'triangle';
  osc1.frequency.setValueAtTime(freq, t0);
  osc1.frequency.exponentialRampToValueAtTime(freq * 0.993, t0 + 0.06);
  gain1.gain.setValueAtTime(0, t0);
  gain1.gain.linearRampToValueAtTime(vol, t0 + 0.005);
  gain1.gain.setValueAtTime(vol * 0.82, t0 + 0.018);
  gain1.gain.exponentialRampToValueAtTime(0.0001, t0 + 2.0);
  osc1.connect(gain1); gain1.connect(audioCtx.destination);
  osc1.start(t0); osc1.stop(t0 + 2.1);

  const osc2 = audioCtx.createOscillator(), gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2.018, t0);
  gain2.gain.setValueAtTime(0, t0);
  gain2.gain.linearRampToValueAtTime(vol * 0.18, t0 + 0.005);
  gain2.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.9);
  osc2.connect(gain2); gain2.connect(audioCtx.destination);
  osc2.start(t0); osc2.stop(t0 + 1.0);
}

function triggerNote() {
  if (!audioCtx) return;
  const pool = Math.random() < 0.70 ? KALIMBA_CORE : KALIMBA_HIGH;
  const freq  = pool[Math.floor(Math.random() * pool.length)];
  pluckNote(freq, 0.22);
  if (Math.random() < 0.22) {
    const hFreq = freq * (Math.random() < 0.55 ? 1.5 : 1.189);
    if (hFreq < 1200) pluckNote(hFreq, 0.10, 0.045);
  }
  noteTimer = 0.28 + Math.random() * 0.57;
}

// =============================================================================
// DRAWING HELPERS
// =============================================================================

function poly(pts, fill, stroke, lw) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  if (fill)   { ctx.fillStyle   = fill;   ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw||1.5; ctx.stroke(); }
}

function pline(x1, y1, x2, y2, w) {
  ctx.globalAlpha = 0.88; ctx.lineWidth = w;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.globalAlpha = 0.28; ctx.lineWidth = w * 0.45;
  ctx.beginPath(); ctx.moveTo(x1+0.6,y1+0.4); ctx.lineTo(x2+0.6,y2+0.4); ctx.stroke();
  ctx.globalAlpha = 1.0;
}

function withAlpha(a, fn) { ctx.save(); ctx.globalAlpha = a; fn(); ctx.restore(); }

// =============================================================================
// SCENE DRAWING
// =============================================================================

function drawStars(ts) {
  ctx.save();
  for (const s of STARS) {
    const pulse = 0.5 + 0.5 * Math.sin(s.ph + ts * 0.001 * s.sp);
    const a = 0.38 + 0.62 * pulse;
    // Outer glow
    ctx.globalAlpha = a * 0.18;
    ctx.fillStyle = '#ffe8a0';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 3.8, 0, Math.PI * 2); ctx.fill();
    // Bright core
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fffef5';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawBackdrop() {
  const x0 = btl[0], x1 = btr[0];
  const y0 = btl[1] - BACKDROP_H;
  const w  = x1 - x0, h = BACKDROP_H;

  ctx.fillStyle = '#d8ccaa';
  ctx.fillRect(x0, y0, w, h);

  const img = backdropImgs[backdropIdx];
  if (img.complete && img.naturalWidth > 0) {
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    ctx.drawImage(img, x0, y0, w, h);
    ctx.restore();
  }
}

function drawStageTop() {
  poly([ftl, ftr, btr, btl], '#8a8070', null);
  drawGrain([ftl, ftr, btr, btl], 0.55);
}

function drawTopEdges() {
  ctx.strokeStyle = '#1a1206';
  pline(ftr[0],ftr[1], btr[0],btr[1], 1.8);
  pline(btr[0],btr[1], btl[0],btl[1], 1.8);
  pline(btl[0],btl[1], ftl[0],ftl[1], 1.8);
}

function drawLid(openT) {
  // Lid rotates around the back hinge (btl/btr) like a laptop opening.
  // openT=0: closed (flat on stage top). openT=1: fully open (~104°, inside faces viewer).
  const theta = easeOut(openT) * LID_OPEN_ANGLE;
  const cosT  = Math.cos(theta);
  const sinT  = Math.sin(theta);
  const ARM_Y = ftl[1] - btl[1]; // depth arm in screen space when closed (≈59 px)
  const RISE  = BACKDROP_H;       // real vertical travel = backdrop height
  const frontY = btl[1] + ARM_Y * cosT - RISE * sinT;
  const fl = [ftl[0], frontY], fr = [ftr[0], frontY];

  if (theta < Math.PI / 2) {
    // Outside of lid visible (wooden top face, foreshortening as it rotates up)
    poly([fl, fr, btr, btl], '#8a8070', null);
    drawGrain([fl, fr, btr, btl], 0.55);
  } else {
    // Inside of lid visible — draw the backdrop image on the inner face
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(fl[0], fl[1]); ctx.lineTo(fr[0], fr[1]);
    ctx.lineTo(btr[0], btr[1]); ctx.lineTo(btl[0], btl[1]);
    ctx.closePath(); ctx.clip();
    ctx.fillStyle = '#d8ccaa'; ctx.fill();
    const img = backdropImgs[backdropIdx];
    if (img.complete && img.naturalWidth > 0) {
      ctx.globalCompositeOperation = 'multiply';
      ctx.drawImage(img, btl[0], frontY, btr[0] - btl[0], btl[1] - frontY);
    }
    ctx.restore();
  }
}

function drawFrontFace() {
  poly([ftl, ftr, fbr, fbl], '#7a7060', null);
  drawGrain([ftl, ftr, fbr, fbl], 0.55);
}

function drawFrontEdges() {
  ctx.strokeStyle = '#1a1206';
  pline(ftl[0],ftl[1], ftr[0],ftr[1], 1.8);
  pline(ftl[0],ftl[1], fbl[0],fbl[1], 1.8);
  pline(ftr[0],ftr[1], fbr[0],fbr[1], 1.8);
  pline(fbl[0],fbl[1], fbr[0],fbr[1], 1.8);
}

function drawSlotTrack(p) {
  const N = 80;
  ctx.beginPath();
  for (let i = 0; i <= N; i++) {
    const pt = p.track.pt((i / N) * Math.PI * 2);
    if (i === 0) ctx.moveTo(pt[0], pt[1]); else ctx.lineTo(pt[0], pt[1]);
  }
  ctx.closePath();
  ctx.strokeStyle = '#150f04'; ctx.lineWidth = 3; ctx.stroke();
}

function drawHousing(cx, cy) {
  ctx.fillStyle = '#5c5648'; ctx.strokeStyle = '#1a1206'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI*2); ctx.fill(); ctx.stroke();
}

function drawPickButton() {
  const [bx, by] = PICK_BTN;
  drawHousing(bx, by);
  ctx.strokeStyle = '#2a1e08'; ctx.lineWidth = 1.8;
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(bx + Math.cos(a)*3, by + Math.sin(a)*3);
    ctx.lineTo(bx + Math.cos(a)*9, by + Math.sin(a)*9);
    ctx.stroke();
  }
  ctx.fillStyle = '#1a1206';
  ctx.beginPath(); ctx.arc(bx, by, 2.5, 0, Math.PI*2); ctx.fill();
}

function drawSceneButton() {
  const [bx, by] = SCENE_BTN;
  drawHousing(bx, by);
  ctx.strokeStyle = '#2a1e08'; ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(bx - 7, by + 5); ctx.lineTo(bx + 7, by + 5); ctx.lineTo(bx, by - 6);
  ctx.closePath(); ctx.stroke();
}

function drawCrankHousing() {
  const [ax, ay] = AXLE;
  drawHousing(ax, ay);
  ctx.fillStyle = '#1a1206';
  ctx.beginPath(); ctx.arc(ax, ay, 4, 0, Math.PI*2); ctx.fill();
}

function drawCrankArm() {
  const [ax, ay] = AXLE;
  const kx = ax + Math.cos(crankA) * 22;
  const ky = ay + Math.sin(crankA) * 22;
  ctx.strokeStyle = '#1a1206'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(kx,ky); ctx.stroke();
  ctx.fillStyle = '#4a3420'; ctx.strokeStyle = '#1a1206'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(kx, ky, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
}

function drawPuppet(p, yOffset, alpha) {
  const PUPPET_SCALE = 1.125;
  const stickH = 52 * PUPPET_SCALE;     // ~58.5 px

  const pos      = p.track.pt(p.angle);
  const posAhead = p.track.pt(p.angle + 0.01);
  const movingRight = posAhead[0] > pos[0];
  const bob      = p.bob(p.angle) * PUPPET_SCALE;
  const waggle   = p.waggle(p.angle);
  const cardTilt = p.cardTilt(p.angle);

  ctx.save();
  ctx.globalAlpha = (alpha !== undefined) ? alpha : 1;
  ctx.translate(pos[0], pos[1] + yOffset);
  ctx.rotate(waggle);

  ctx.strokeStyle = '#6a4828'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, bob - stickH); ctx.stroke();
  ctx.lineCap = 'butt';

  ctx.save();
  ctx.translate(0, bob - stickH);
  ctx.rotate(cardTilt);

  const bx = -p.cardW / 2, by = -p.cardH;
  ctx.fillStyle = '#ede4c8'; ctx.strokeStyle = '#1a1206'; ctx.lineWidth = 1.0;
  ctx.beginPath(); ctx.rect(bx, by, p.cardW, p.cardH); ctx.fill(); ctx.stroke();

  if (p.img.complete && p.img.naturalWidth > 0) {
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    if (movingRight) ctx.scale(-1, 1);
    ctx.drawImage(p.img, bx, by, p.cardW, p.cardH);
    ctx.restore();
  }

  ctx.restore();
  ctx.restore();
}

// =============================================================================
// MAIN LOOP
// =============================================================================

function draw(ts) {
  const dt = lastT === null ? 0 : Math.min((ts - lastT) / 1000, 0.08);
  lastT = ts;

  // Advance opening animation
  if (openState === 'opening') {
    openT += dt / OPEN_DUR;
    if (openT >= 1) { openT = 1; openState = 'open'; }
  }

  // Advance crank
  if (running) {
    for (const p of perf) p.angle += SPEED * dt;
    crankA += SPEED * dt * 2.0;
    noteTimer -= dt;
    if (noteTimer <= 0) triggerNote();
    tickTimer -= dt;
    if (tickTimer <= 0) {
      fireTick();
      tickTimer = 0.06 + Math.random() * 0.08; // irregular: ~8–14 ticks/sec
    }
  }

  // Advance character transition
  if (transPhase !== 'idle') {
    transT += dt / TRANS_DUR;
    if (transT >= 1) {
      if (transPhase === 'exiting') {
        perf       = pendingPerf;
        pendingPerf = null;
        transPhase  = 'entering';
        transT      = 0;
      } else {
        transPhase = 'idle';
        transT     = 0;
        if (openState === 'open') openState = 'playing';
      }
    }
  }

  const yOff  = currentYOffset();
  const alpha = currentAlpha();

  const DIM = 0.28;

  // --- Render ---
  ctx.fillStyle = '#1e1810';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars first, in the dark surround
  drawStars(ts);

  // Backdrop: static once open; during opening the lid itself shows the image
  if (openState === 'open' || openState === 'playing') drawBackdrop();

  // Stage surface
  drawStageTop();

  // Slot grooves drawn first, then puppets on top
  for (const p of perf) drawSlotTrack(p);
  const sorted = [...perf].sort((a, b) =>
    a.track.pt(a.angle)[1] - b.track.pt(b.angle)[1]
  );
  for (const p of sorted) drawPuppet(p, yOff, alpha);

  // Lid rotates open like a laptop, revealing backdrop on inside face
  if (openState === 'closed') drawLid(0);
  else if (openState === 'opening') drawLid(openT);

  // Front face covers characters that descend into it during transitions
  drawFrontFace();

  // Buttons (dimmed until unlocked)
  withAlpha(isEnabled('scene') ? 1 : DIM, drawSceneButton);
  withAlpha(isEnabled('pick')  ? 1 : DIM, drawPickButton);
  // Crank housing drawn here, arm drawn absolutely last so it clears the stage edge
  withAlpha(isEnabled('crank') ? 1 : DIM, drawCrankHousing);
  withAlpha(isEnabled('crank') ? 1 : DIM, drawCrankArm);

  requestAnimationFrame(draw);
}

// =============================================================================
// INPUT
// =============================================================================

function getCanvasPos(e) {
  const r = canvas.getBoundingClientRect();
  return [(e.clientX - r.left) * canvas.width  / r.width,
          (e.clientY - r.top)  * canvas.height / r.height];
}

function inCircle(x, y, cx, cy) {
  const dx = x-cx, dy = y-cy;
  return dx*dx + dy*dy <= HIT_R * HIT_R;
}

canvas.addEventListener('mousedown', e => {
  if (!audioCtx) {
    audioCtx = new AudioContext();
  } else if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  const [x, y] = getCanvasPos(e);

  if (isEnabled('crank') && inCircle(x, y, AXLE[0], AXLE[1])) {
    running = true; lastT = null;
    if (noteTimer <= 0) noteTimer = 0.05;

  } else if (isEnabled('pick') && inCircle(x, y, PICK_BTN[0], PICK_BTN[1])) {
    if (openState === 'open' && transPhase === 'idle') {
      perf       = makeNewPair();
      transPhase = 'entering';
      transT     = 0;
    } else if (openState === 'playing') {
      startTransition();
    }

  } else if (isEnabled('scene') && inCircle(x, y, SCENE_BTN[0], SCENE_BTN[1])) {
    if (openState === 'closed') {
      openState = 'opening';
      openT     = 0;
    } else {
      backdropIdx = (backdropIdx + 1) % N_BACKDROPS;
    }
  }
});

canvas.addEventListener('mouseup',    () => { running = false; });
canvas.addEventListener('mouseleave', () => { running = false; });
canvas.addEventListener('mousemove', e => {
  const [x, y] = getCanvasPos(e);
  canvas.style.cursor = (
    (isEnabled('crank') && inCircle(x,y,AXLE[0],AXLE[1])) ||
    (isEnabled('pick')  && inCircle(x,y,PICK_BTN[0],PICK_BTN[1])) ||
    (isEnabled('scene') && inCircle(x,y,SCENE_BTN[0],SCENE_BTN[1]))
  ) ? 'pointer' : 'default';
});

requestAnimationFrame(draw);
</script>
</body>
</html>
