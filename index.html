const CARD_H = 123;  // 112.5 % of original 110 px

// Chroma-key an image and pre-scale it to its final display size.
// Returns an offscreen canvas at cardW×CARD_H with green pixels removed.
// Pre-scaling eliminates moiré from real-time downscaling of high-res images.
function chromaKey(img, greenDominance = 60, minGreen = 80) {
  // Step 1: key out green at full resolution
  const full = document.createElement('canvas');
  full.width = img.naturalWidth; full.height = img.naturalHeight;
  const fc = full.getContext('2d');
  fc.drawImage(img, 0, 0);
  try {
    const id = fc.getImageData(0, 0, full.width, full.height);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      const dominance = g - Math.max(r, b);
      if (g > minGreen && dominance > 0) {
        const t = Math.min(1, dominance / greenDominance);
        d[i+3] = Math.round(d[i+3] * (1 - t));
      }
    }
    fc.putImageData(id, 0, 0);
  } catch (e) {
    // CORS/tainted canvas on file:// — proceed without chroma keying
  }

  // Step 2: scale down to display size so drawImage is always 1:1
  const cardW = Math.round(CARD_H * img.naturalWidth / img.naturalHeight);
  const scaled = document.createElement('canvas');
  scaled.width = cardW; scaled.height = CARD_H;
  const sc = scaled.getContext('2d');
  sc.imageSmoothingEnabled = true;
  sc.imageSmoothingQuality = 'high';
  sc.drawImage(full, 0, 0, cardW, CARD_H);
  return scaled;
}

  raw.onload = () => {
    e.img   = chromaKey(raw);
    e.cardW = e.img.width;   // pre-scaled canvas is already the right size

  return e;
}

// =============================================================================
// GEOMETRY  — wider stage, fills canvas width
// =============================================================================

const VP    = [320, 210];
const DEPTH = 0.32;

function lerp2(a, b, t) {
  return [a[0] + t*(b[0]-a[0]), a[1] + t*(b[1]-a[1])];
}

const fbl = [ 20, 448];  const fbr = [620, 448];
const ftl = [ 20, 393];  const ftr = [620, 393];
const btl = lerp2(ftl, VP, DEPTH);
const btr = lerp2(ftr, VP, DEPTH);
const bbl = lerp2(fbl, VP, DEPTH);
const bbr = lerp2(fbr, VP, DEPTH);

function topPt(s, t) {
  return [
    (1-s)*(1-t)*ftl[0] + s*(1-t)*ftr[0] + (1-s)*t*btl[0] + s*t*btr[0],
    (1-s)*(1-t)*ftl[1] + s*(1-t)*ftr[1] + (1-s)*t*btl[1] + s*t*btr[1],
  ];
}

// =============================================================================
// WOBBLY TRACK GENERATOR
// =============================================================================

function makeWobblyTrack() {
  const os = 0.38, ot = 0.32;
  const harms = [2, 3].map(n => ({
    n,
    as: (Math.random() - 0.5) * os * 0.50,
    at: (Math.random() - 0.5) * ot * 0.50,
    ps: Math.random() * Math.PI * 2,
    pt: Math.random() * Math.PI * 2,
  }));

  function rawS(a) {
    let s = 0.5 + os * Math.cos(a);
    for (const h of harms) s += h.as * Math.cos(h.n * a + h.ps);
    return s;
  }
  function rawT(a) {
    let t = 0.5 + ot * Math.sin(a);
    for (const h of harms) t += h.at * Math.sin(h.n * a + h.pt);
    return t;
  }

  const N_SAMP = 256;
  let sMin =  Infinity, sMax = -Infinity;
  let tMin =  Infinity, tMax = -Infinity;
  for (let i = 0; i < N_SAMP; i++) {
    const a = (i / N_SAMP) * Math.PI * 2;
    const s = rawS(a), t = rawT(a);
    if (s < sMin) sMin = s;  if (s > sMax) sMax = s;
    if (t < tMin) tMin = t;  if (t > tMax) tMax = t;
  }

  const MRG = 0.07;
  const sRng = sMax - sMin, tRng = tMax - tMin;
  return {
    pt(a) {
      const s = MRG + (rawS(a) - sMin) / sRng * (1 - 2*MRG);
      const t = MRG + (rawT(a) - tMin) / tRng * (1 - 2*MRG);
      return topPt(s, t);
    },
  };
}

function twoDistinctIndices(n) {
  const a = Math.floor(Math.random() * n);
  let b;
  do { b = Math.floor(Math.random() * n); } while (b === a);
  return [a, b];
}

function makeNewPair() {

      track:    sharedTrack,
      angle:    slot * Math.PI,
    };
  });
}

const SLIDE_DIST = 155;   // px; enough to hide 75%-scale puppets below stage

let transPhase  = 'idle';
let transT      = 0;
let pendingPerf = null;

function easeIn(t)  { return t * t; }
function easeOut(t) { return 1 - (1-t)*(1-t); }

function currentYOffset() {
  if (transPhase === 'exiting')  return easeIn(transT)  * SLIDE_DIST;
  if (transPhase === 'entering') return (1 - easeOut(transT)) * SLIDE_DIST;
  return 0;
}

function currentAlpha() {
  if (transPhase === 'exiting')  return 1 - easeIn(transT);
  if (transPhase === 'entering') return easeOut(transT);
  return 1;
}

function startTransition() {
  if (transPhase !== 'idle') return;
  pendingPerf = makeNewPair();
  transPhase  = 'exiting';
  transT      = 0;
  playScript = [];

  resetAudience();
}

// =============================================================================

// =============================================================================

const N_BACKDROPS = 5;
let   backdropIdx = 0;

// Scene transition state machine (mirrors character transition)
const SCENE_TRANS_DUR = 0.5;
let sceneTransPhase = 'idle';   // 'idle' | 'exiting' | 'entering'
let sceneTransT     = 0;
let pendingBackdrop = -1;

function startSceneTransition() {
  if (sceneTransPhase !== 'idle' || transPhase !== 'idle') return;
  // Pick a random backdrop that isn't the current one
  let next;
  do { next = Math.floor(Math.random() * N_BACKDROPS); } while (next === backdropIdx);
  pendingBackdrop = next;
  sceneTransPhase = 'exiting';
  sceneTransT     = 0;
  // Also clear any active play
  playScript = [];
  playBeatIdx = -1;
  for (const c of cueCards) { c.phase = 'exiting'; c.phaseT = 0; }
  emotionParticles = [];
  resetAudience();
}

function sceneYOffset() {
  if (sceneTransPhase === 'exiting')  return easeIn(sceneTransT)  * BACKDROP_H;
  if (sceneTransPhase === 'entering') return (1 - easeOut(sceneTransT)) * BACKDROP_H;
  return 0;
}

const TITLE_FORMATS = [
  (a, b) => a + '  &  ' + b,
  (a, b) => 'The Tale of ' + a + ' & ' + b,
  (a, b, arc) => a + ' & ' + b + ':  ' + arc,
  (a, b, arc) => arc + ':  ' + a + ' & ' + b,
  (a, b) => a + '  ·  ' + b,
  (a, b) => 'A Play of ' + a + ' and ' + b,
];

function makeTitle(a, b, arcName) {
  const fmt = TITLE_FORMATS[Math.floor(Math.random() * TITLE_FORMATS.length)];
  return fmt(a, b, arcName);
}

const ACT_NAMES = ['I', 'II', 'III'];
const CAT_TO_MOOD = {
  greeting: 'greeting', boast: 'boast', challenge: 'conflict',
  devotion: 'devotion', insult: 'conflict', despair: 'despair',
  madness: 'madness', prophecy: 'prophecy', triumph: 'triumph',
  farewell: 'farewell',
};

function pickLine(cat, preferTone, used, preferSubj, playSubjects) {
  // Determine subject preference: explicit > play-level > none
  const subjs = preferSubj ? [preferSubj] : (playSubjects || []);

  // Best: matching cat + tone + preferred subject
  let pool = [];
  if (subjs.length > 0) {
    pool = CORPUS.filter(l => l.cat === cat && l.tone === preferTone && subjs.includes(l.subj) && !used.has(l.text));
  }
  // Good: matching cat + preferred subject (any tone)
  if (pool.length === 0 && subjs.length > 0) {
    pool = CORPUS.filter(l => l.cat === cat && subjs.includes(l.subj) && !used.has(l.text));
  }
  // OK: matching cat + tone
  if (pool.length === 0) pool = CORPUS.filter(l => l.cat === cat && l.tone === preferTone && !used.has(l.text));
  // Fallback: matching cat
  if (pool.length === 0) pool = CORPUS.filter(l => l.cat === cat && !used.has(l.text));
  if (pool.length === 0) pool = CORPUS.filter(l => l.cat === cat);
  const line = pool[Math.floor(Math.random() * pool.length)];
  used.add(line.text);
  return line;
}

function findCouplet(callCat, replyCat, used) {
  const pool = COUPLETS.filter(c =>
    c.cats[0] === callCat && c.cats[1] === replyCat &&
    !used.has(c.call) && !used.has(c.reply)
  );
  if (pool.length === 0) return null;
  const c = pool[Math.floor(Math.random() * pool.length)];
  used.add(c.call);
  used.add(c.reply);
  return c;
}

  let motifSpeaker = null;

  arc.acts.forEach((actBeats, ai) => {
    script.push({ act: ai+1, type: 'act-title', text: 'Act ' + ACT_NAMES[ai], mood: null, speaker: null });

    const dirPool = ai === 0 ? STAGE_DIRS_OPEN : STAGE_DIRS_MID;
    let avail = dirPool.filter(d => !usedDirs.has(d));
    if (avail.length === 0) avail = dirPool;
    const dir = avail[Math.floor(Math.random() * avail.length)];
    usedDirs.add(dir);
    script.push({ act: ai+1, type: 'direction', text: dir, mood: null, speaker: null });

    let i = 0;
    while (i < actBeats.length) {
      const [cat, sp] = actBeats[i];

      // Motif callback: in Act III, before the last beat, echo an Act I line
      if (ai === 2 && i === actBeats.length - 2 && motifLine) {
        const otherSp = motifSpeaker === 0 ? 1 : 0;
        script.push({ act: 3, type: 'line', speaker: otherSp, text: motifLine.text, mood: CAT_TO_MOOD[motifLine.cat] || 'farewell' });
        motifLine = null; // only once
      }

      // Try to use a couplet if the next beat is by the other speaker
      if (i + 1 < actBeats.length) {
        const [nextCat, nextSp] = actBeats[i + 1];
        if (nextSp !== sp) {
          const coup = findCouplet(cat, nextCat, used);
          if (coup) {
            script.push({ act: ai+1, type: 'line', speaker: sp, text: coup.call, mood: CAT_TO_MOOD[cat] });
            script.push({ act: ai+1, type: 'line', speaker: nextSp, text: coup.reply, mood: CAT_TO_MOOD[nextCat] });
            lastSubj = null;
            i += 2;
            continue;
          }
        }
      }

      // Subject bias: 65% chance to thread from last subject, else use play subjects
      const biasSubj = (lastSubj && Math.random() < 0.65) ? lastSubj : null;
      const line = pickLine(cat, tones[sp], used, biasSubj, playSubjects);
      script.push({ act: ai+1, type: 'line', speaker: sp, text: line.text, mood: CAT_TO_MOOD[cat] });
      lastSubj = line.subj;

      // Save a memorable Act I line as potential motif (pick the 2nd or 3rd dialogue line)
      if (ai === 0 && !motifLine && i >= 1 && cat !== 'greeting') {
        motifLine = line;
        motifSpeaker = sp;
      }

      i++;
    }
  });

  return { script, arcName: arc.name };
}

let playScript     = [];
let playBeatIdx    = -1;
let playCrankAccum = 0;
let playEnded      = false;
let windDown       = 1.0;
const BEAT_BASE    = 2 * Math.PI;

const MOOD_PACE = {
  greeting: 1.0,  boast: 0.9,  conflict: 0.65,
  devotion: 1.15, despair: 1.25, madness: 0.55,
  prophecy: 1.2,  triumph: 0.80, farewell: 1.4,
};

function beatPace(idx) {
  if (idx < 0 || idx >= playScript.length) return 1.0;
  const b = playScript[idx];
  if (b.type === 'title' || b.type === 'fin') return 0.7;
  if (b.type === 'act-title') return 0.8;
  if (b.type === 'direction') return 0.5;
  if (!b.mood) return 0.5;
  return MOOD_PACE[b.mood] || 1.0;
}

let cueCards = [];

function activateBeat(beat) {
  for (const c of cueCards) {
    if (c.phase !== 'exiting') { c.phase = 'exiting'; c.phaseT = 0; }
  }
  if (!beat) return;
  if (beat.type === 'title')                        playTitleSting();
  if (beat.type === 'act-title' && beat.act >= 2) {
    playActEndBell();
    musicHush = HUSH_DUR;
  }
  if (beat.type === 'act-title')                    playActSting();
  if (beat.type === 'direction')                    playDirSting();
  if (beat.type === 'fin')                          playFinSting();
  if (beat.type === 'line' && beat.speaker !== null && beat.mood) {
    spawnEmotionGlyphs(beat.speaker, beat.mood);
  }
  cueCards.push({
    text:     beat.text,
    type:     beat.type,
    speaker:  beat.speaker,
    mood:     beat.mood,
    phase:    'entering',
    phaseT:   0,
    rotation: (Math.random() - 0.5) * 0.035,
  });
  triggerAudienceReaction(beat);
}

let suffusion = { mood: null, intensity: 0, speakerIdx: -1 };

function lerpColor(a, b, t) {
  return [
    Math.round(a[0] + (b[0] - a[0]) * t),
    Math.round(a[1] + (b[1] - a[1]) * t),
    Math.round(a[2] + (b[2] - a[2]) * t),
  ];
}

function cardTintForPuppet(puppetIdx) {
  if (!suffusion.mood || suffusion.intensity <= 0) return null;
  if (puppetIdx !== suffusion.speakerIdx) return null;
  const mc = MOOD_COLORS[suffusion.mood];
  if (!mc) return null;
  const c = lerpColor(CREAM, mc.card, suffusion.intensity);
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

function backdropWashColor() {
  if (!suffusion.mood || suffusion.intensity <= 0) return null;
  const mc = MOOD_COLORS[suffusion.mood];
  if (!mc) return null;
  const base = [0xd8, 0xcc, 0xaa];
  const c = lerpColor(base, mc.card, suffusion.intensity * 0.45);
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

function updateSuffusion() {
  let active = null;
  for (let i = cueCards.length - 1; i >= 0; i--) {
    if (cueCards[i].mood && cueCards[i].phase !== 'gone') { active = cueCards[i]; break; }
  }
  if (active) {
    suffusion.mood = active.mood;
    suffusion.speakerIdx = active.speaker;
    if (active.phase === 'entering') {
      suffusion.intensity = easeOut(Math.min(active.phaseT / 0.4, 1));
    } else if (active.phase === 'holding') {
      suffusion.intensity = 1;
    } else if (active.phase === 'exiting') {
      suffusion.intensity = 1 - easeIn(Math.min(active.phaseT / 0.8, 1));
    }
  } else {
    suffusion.intensity *= 0.92;
    if (suffusion.intensity < 0.01) { suffusion.intensity = 0; suffusion.mood = null; }
  }
}

function startPlay() {
  const gen = generateScript();
  const title = makeTitle(perf[0].name, perf[1].name, gen.arcName);
  playScript = [
    { act: 0, type: 'title', text: title, mood: null, speaker: null },
    ...gen.script,
    { act: 4, type: 'fin', text: 'Fin', mood: null, speaker: null },
  ];
  playBeatIdx    = -1;
  playCrankAccum = BEAT_BASE * 0.75;
  cueCards       = [];
  suffusion      = { mood: null, intensity: 0, speakerIdx: -1 };
  emotionParticles = [];
  playEnded      = false;
  windDown       = 1.0;
  resetAudience();
}

// --- Emotion glyph particles ---

const EMOTION_GLYPHS = {
  greeting:  ['✦', '·', '★'],
  boast:     ['★', '✦', '♔'],
  conflict:  ['@', '#', '$', '%', '!', '&'],
  devotion:  ['♥', '❦', '✿'],
  despair:   ['◦', '·', '˙'],
  madness:   ['?', '!', '◎', '※'],
  prophecy:  ['✦', '◈', '★'],
  triumph:   ['★', '!', '♔'],
  farewell:  ['·', '◦', '∘'],
};

let emotionParticles = [];

function puppetCardTop(pIdx) {
  const p = perf[pIdx];
  if (!p) return null;
  const pos = p.track.pt(p.angle);
  const yOff = currentYOffset();
  const bob = p.bob(p.angle) * 1.125;
  const stickH = 52 * 1.125;
  // card top: stage surface + yOffset + bob - stick - full card height
  return [pos[0], pos[1] + yOff + bob - stickH - p.cardH];
}

function spawnEmotionGlyphs(speakerIdx, mood) {
  const top = puppetCardTop(speakerIdx);
  if (!top) return;
  const pool = EMOTION_GLYPHS[mood] || EMOTION_GLYPHS.greeting;
  const count = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    emotionParticles.push({
      glyph: pool[Math.floor(Math.random() * pool.length)],
      x: top[0] + (Math.random() - 0.5) * 40,
      y: top[1] - Math.random() * 12,
      vx: (Math.random() - 0.5) * 20,
      vy: -12 - Math.random() * 18,
      life: 0,
      maxLife: 2.5 + Math.random() * 1.5,
      size: 24 + Math.random() * 14,
      rot: (Math.random() - 0.5) * 0.4,
      rotV: (Math.random() - 0.5) * 0.6,
    });
  }
}

function drawEmotionParticles() {
  for (const p of emotionParticles) {
    const t = p.life / p.maxLife;
    const a = t < 0.1 ? t / 0.1 : t > 0.75 ? (1 - t) / 0.25 : 1.0;
    if (a <= 0.01) continue;
    ctx.save();
    ctx.globalAlpha = a * 0.88;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.font = 'bold ' + p.size + 'px Georgia, "Times New Roman", serif';
    ctx.fillStyle = '#8a8a90';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.glyph, 0, 0);
    ctx.restore();
  }
}

const DUST = (() => {
  const backdropTop = btl[1] - BACKDROP_H;
  const bL = btl[0] - 16;
  const bR = btr[0] + 16;
  const stageBot = fbl[1] + 4;

  function rnd(a, b) { return a + Math.random() * (b - a); }
  function mk(x, y) {
    return {
      x, y,
      r:   0.4 + Math.random() * 1.0,
      a:   0.07 + Math.random() * 0.16,
      ph:  Math.random() * Math.PI * 2,
      vx:  0.10 + Math.random() * 0.22,   // horizontal drift freq
      vy:  0.06 + Math.random() * 0.14,   // vertical drift freq
      ax:  5 + Math.random() * 16,        // horizontal drift range px
      ay:  6 + Math.random() * 14,        // vertical drift range px
    };
  }

  const d = [];
  // Above the backdrop (full canvas width) — densest, lit by ambient glow
  for (let i = 0; i < 52; i++) d.push(mk(rnd(4, 636), rnd(4, backdropTop - 6)));
  // Flanking margins
  for (let i = 0; i < 8;  i++) d.push(mk(rnd(4, bL),   rnd(backdropTop, ftl[1])));
  for (let i = 0; i < 8;  i++) d.push(mk(rnd(bR, 636), rnd(backdropTop, ftl[1])));
  // Below the stage
  for (let i = 0; i < 20; i++) d.push(mk(rnd(4, 636),  rnd(stageBot, 516)));
  return d;
})();

// Pre-baked wood grain texture: long wavy horizontal grain lines + sparse stipple.
// Used for all box surfaces (stage top, front face, lid).
const woodCanvas = (() => {
  const wc = document.createElement('canvas');
  wc.width = 640; wc.height = 520;
  const wx = wc.getContext('2d');
  const rnd = () => Math.random();
  // Long wavy grain lines — the dominant feature of wood
  for (let i = 0; i < 380; i++) {
    const y = rnd() * 520;
    const dark = rnd() < 0.28;
    wx.strokeStyle = dark
      ? `rgba(18,8,0,${0.06 + rnd() * 0.18})`
      : `rgba(70,35,5,${0.03 + rnd() * 0.07})`;
    wx.lineWidth = 0.5 + rnd() * (dark ? 2.0 : 1.0);
    wx.beginPath();
    wx.moveTo(0, y);
    const cp1y = y + (rnd() - 0.5) * 8;
    const cp2y = y + (rnd() - 0.5) * 10;
    const endY  = y + (rnd() - 0.5) * 5;
    wx.bezierCurveTo(160 + rnd() * 80, cp1y, 380 + rnd() * 80, cp2y, 640, endY);
    wx.stroke();
  }
  // Sparse stipple to bind the grain
  for (let i = 0; i < 5000; i++) {
    wx.fillStyle = `rgba(0,0,0,${0.03 + rnd() * 0.07})`;
    wx.fillRect(rnd() * 640, rnd() * 520, 1, 1);
  }
  // One subtle knot swirl
  const kx = 90 + rnd() * 320, ky = 60 + rnd() * 300;
  for (let i = 0; i < 7; i++) {
    const r = 5 + i * 3.2;
    wx.strokeStyle = `rgba(25,10,0,${0.10 - i * 0.012})`;
    wx.lineWidth = 1.0;
    wx.beginPath();
    wx.ellipse(kx, ky, r * 2.0, r * 0.65, 0.1, 0, Math.PI * 2);
    wx.stroke();
  }
  return wc;
})();

// Pre-baked paper/leather texture: fine cross-fiber stipple + aging patches.
// Used on the puppet cards (the surfaces that carry the character drawings).
const paperCanvas = (() => {
  const pc = document.createElement('canvas');
  pc.width = 640; pc.height = 520;
  const px = pc.getContext('2d');
  const rnd = () => Math.random();
  // Fine stipple — denser and finer than wood
  for (let i = 0; i < 24000; i++) {
    px.fillStyle = `rgba(70,40,15,${0.02 + rnd() * 0.09})`;
    px.fillRect(rnd() * 640, rnd() * 520, rnd() < 0.65 ? 0.7 : 1.0, 0.7);
  }
  // Short crossing fibers (horizontal + vertical at low freq)
  for (let i = 0; i < 3200; i++) {
    const x = rnd() * 640, y = rnd() * 520;
    const len   = 1.5 + rnd() * 7;
    const angle = rnd() < 0.55 ? (rnd() - 0.5) * 0.25 : Math.PI * 0.5 + (rnd() - 0.5) * 0.25;
    px.strokeStyle = `rgba(55,30,8,${0.03 + rnd() * 0.06})`;
    px.lineWidth   = 0.3 + rnd() * 0.4;
    px.beginPath();
    px.moveTo(x, y);
    px.lineTo(x + Math.cos(angle) * len, y + Math.sin(angle) * len);
    px.stroke();
  }
  // Subtle aging blobs — old foxing marks
  for (let i = 0; i < 10; i++) {
    const gx2 = rnd() * 640, gy2 = rnd() * 520;
    const r = 12 + rnd() * 35;
    const g = px.createRadialGradient(gx2, gy2, 0, gx2, gy2, r);
    g.addColorStop(0, `rgba(55,28,0,${0.07 + rnd() * 0.09})`);
    g.addColorStop(1, 'rgba(55,28,0,0)');
    px.fillStyle = g;
    px.fillRect(gx2 - r, gy2 - r, r * 2, r * 2);
  }
  return pc;
})();

// Pre-baked grain texture: random stipple + short fiber strokes for rough wood feel.
const grainCanvas = (() => {
  const gc = document.createElement('canvas');
  gc.width = 640; gc.height = 520;
  const gx = gc.getContext('2d');
  const rnd = () => Math.random();
  // Fine stipple
  for (let i = 0; i < 18000; i++) {
    gx.fillStyle = `rgba(0,0,0,${0.04 + rnd() * 0.18})`;
    gx.fillRect(rnd() * 640, rnd() * 520, rnd() < 0.6 ? 1 : 1.5, 1);
  }
  // Short fiber strokes (mostly horizontal, slight angle variation)
  for (let i = 0; i < 2200; i++) {
    const x = rnd() * 640, y = rnd() * 520;
    const len = 3 + rnd() * 12;
    const angle = (rnd() - 0.5) * 0.4;
    gx.strokeStyle = `rgba(0,0,0,${0.04 + rnd() * 0.10})`;
    gx.lineWidth = 0.6 + rnd() * 0.6;
    gx.beginPath();
    gx.moveTo(x, y);
    gx.lineTo(x + Math.cos(angle) * len, y + Math.sin(angle) * len);
    gx.stroke();
  }
  return gc;
})();

// Overlay grain texture clipped to an arbitrary polygon.
function drawGrain(pts, alpha) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath(); ctx.clip();
  ctx.globalAlpha = alpha;
  ctx.globalCompositeOperation = 'multiply';
  ctx.drawImage(grainCanvas, 0, 0);
  ctx.restore();
}

// Overlay wood grain texture clipped to an arbitrary polygon.
function drawWoodGrain(pts, alpha) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath(); ctx.clip();
  ctx.globalAlpha = alpha;
  ctx.globalCompositeOperation = 'multiply';
  ctx.drawImage(woodCanvas, 0, 0);
  ctx.restore();
}

// Back-of-head shape variants. Center-bottom = (0,0), y grows upward (negative).

// hw=head half-w, hh=head rise, crown=optional accessory
const BACK_VARS = [

  { sw:10, sh:9, nw:4, nh:5, hw:6,  hh:15, crown:null },      // tall & thin

// Profile variants. All face right; caller flips for left-facing.
const PROF_VARS = [
  { nose:5,   brow:2.5, chin:2.5, backHead:8, headH:14, neckL:3, bodyW:10, bodyH:14 },
  { nose:7,   brow:3.5, chin:1.5, backHead:7, headH:15, neckL:3, bodyW:9,  bodyH:13 },
  { nose:3,   brow:1.5, chin:3,   backHead:9, headH:13, neckL:3, bodyW:11, bodyH:14, crown:'bun' },
  { nose:5.5, brow:4,   chin:2,   backHead:7, headH:16, neckL:4, bodyW:9,  bodyH:15 },
];

// Trace back-of-head outline. Assumes ctx is translated/scaled by caller.
function traceBackShape(v) {
  const { sw, sh, nw, nh, hw, hh, crown } = v;
  const nb = sh + nh;
  const ht = nb + hh;
  ctx.beginPath();
  ctx.moveTo(-sw, 0);
  ctx.lineTo(-sw, -sh);
  ctx.quadraticCurveTo(-nw - 1, -sh - 1, -nw, -sh - 2);
  ctx.lineTo(-nw, -nb);
  ctx.quadraticCurveTo(-hw - 1, -nb, -hw, -nb - hh * 0.4);
  if (crown === 'frizzy') {
    ctx.quadraticCurveTo(-hw - 2, -ht + 2, -hw * 0.5, -ht - 2);
    ctx.lineTo(-hw * 0.15, -ht);
    ctx.quadraticCurveTo(0, -ht - 3, hw * 0.15, -ht);
    ctx.lineTo(hw * 0.5, -ht - 2);
    ctx.quadraticCurveTo(hw + 2, -ht + 2, hw, -nb - hh * 0.4);
  } else {
    ctx.quadraticCurveTo(-hw, -ht, 0, -ht);
    ctx.quadraticCurveTo(hw, -ht, hw, -nb - hh * 0.4);
  }
  ctx.quadraticCurveTo(hw + 1, -nb, nw, -nb);
  ctx.lineTo(nw, -sh - 2);
  ctx.quadraticCurveTo(nw + 1, -sh - 1, sw, -sh);
  ctx.lineTo(sw, 0);
  ctx.closePath();
  if (crown === 'bun') {
    ctx.moveTo(4.5, -ht - 1);
    ctx.arc(0, -ht - 1, 4.5, 0, Math.PI * 2);
  }
  if (crown === 'hat') {
    const bw = hw + 3;
    ctx.moveTo(-bw, -ht); ctx.lineTo(-bw, -ht - 2.5);
    ctx.lineTo(bw, -ht - 2.5); ctx.lineTo(bw, -ht); ctx.closePath();
    ctx.moveTo(-hw + 2, -ht - 2.5); ctx.lineTo(-hw + 2, -ht - 10);
    ctx.quadraticCurveTo(-hw + 2, -ht - 13, 0, -ht - 13);
    ctx.quadraticCurveTo(hw - 2, -ht - 13, hw - 2, -ht - 10);
    ctx.lineTo(hw - 2, -ht - 2.5); ctx.closePath();
  }
}

// Trace profile silhouette facing right. Caller uses ctx.scale(-1,1) for left.
function traceProfileShape(v) {
  const { nose, brow, chin, backHead, headH, neckL, bodyW, bodyH, crown } = v;
  const top = bodyH + neckL + headH;
  const ny  = bodyH + neckL;
  const hm  = ny + headH * 0.5;
  ctx.beginPath();
  ctx.moveTo(-bodyW / 2, 0);
  ctx.lineTo(-bodyW / 2, -bodyH);
  ctx.quadraticCurveTo(-bodyW / 3, -bodyH - 2, -bodyW / 4, -bodyH - 2);
  ctx.lineTo(-bodyW / 4, -ny);
  ctx.quadraticCurveTo(-backHead, -ny, -backHead, -hm);
  ctx.quadraticCurveTo(-backHead, -top, 0, -top);
  ctx.lineTo(brow * 0.5, -top + 2);
  ctx.lineTo(brow, -top + headH * 0.25);
  ctx.lineTo(brow - 0.5, -top + headH * 0.35);
  ctx.lineTo(nose, -top + headH * 0.5);
  ctx.lineTo(nose - 2, -top + headH * 0.56);
  ctx.lineTo(chin * 0.5, -top + headH * 0.62);
  ctx.quadraticCurveTo(chin, -top + headH * 0.85, chin - 1, -ny + 1);
  ctx.lineTo(bodyW / 4, -ny);
  ctx.lineTo(bodyW / 4, -bodyH - 1);
  ctx.quadraticCurveTo(bodyW / 3, -bodyH, bodyW / 2, -bodyH);
  ctx.lineTo(bodyW / 2, 0);
  ctx.closePath();
  if (crown === 'bun') {
    ctx.moveTo(-backHead - 1 + 3.5, -hm - 2);
    ctx.arc(-backHead - 1, -hm - 2, 3.5, 0, Math.PI * 2);
  }
}

  const bp2 = ['attentive','sleepy','attentive','emotional','attentive','fidgety','attentive'];
  for (let i = 0; i < 7; i++) {
    m.push({
      x: bx2[i] + rnd(-5, 5),  y: 515 + rnd(-3, 4),
      type: 'back', variant: bv2[i],
      scale: 0.92 + rnd(0, 0.20),
      swayPhase: rnd(0, Math.PI * 2), swayFreq: 0.28 + rnd(0, 0.18),
      swayAmp: 0.025 + rnd(0, 0.018),
      personality: bp2[i],
      tilt: 0, yShift: 0, xShift: 0,
      reaction: null, gone: false,
    });
  }

  // Left profiles: 4 figures
  for (let i = 0; i < 4; i++) {
    m.push({
      x: 25 + rnd(0, 45), y: 240 + i * 28 + rnd(-4, 4),
      type: 'profile', facing: 1, variant: i % PROF_VARS.length,
      scale: 0.85 + rnd(0, 0.15),
      swayPhase: rnd(0, Math.PI * 2), swayFreq: 0.25 + rnd(0, 0.10),
      swayAmp: 0.022 + rnd(0, 0.012),
      personality: i === 2 ? 'emotional' : 'attentive',
      tilt: 0, yShift: 0, xShift: 0,
      reaction: null, gone: false,
    });
  }

  // Right profiles: 4 figures
  for (let i = 0; i < 4; i++) {
    m.push({
      x: 550 + rnd(0, 45), y: 240 + i * 28 + rnd(-4, 4),
      type: 'profile', facing: -1, variant: (i + 2) % PROF_VARS.length,
      scale: 0.85 + rnd(0, 0.15),
      swayPhase: rnd(0, Math.PI * 2), swayFreq: 0.25 + rnd(0, 0.10),
      swayAmp: 0.022 + rnd(0, 0.012),
      personality: i === 3 ? 'sleepy' : 'attentive',
      tilt: 0, yShift: 0, xShift: 0,
      reaction: null, gone: false,
    });
  }

  return m;
})();

// --- Reaction definitions ---
const AUD_REACTIONS = {
  'lean-fwd':    { tilt: -0.14, yShift: -5,  dur: [0.25, 0.5, 0.45] },
  'lean-back':   { tilt:  0.10, yShift:  3,  dur: [0.35, 0.4, 0.5] },
  'jolt':        { tilt: -0.18, yShift: -7,  dur: [0.06, 0.10, 0.35] },
  'nod-off':     { tilt:  0.22, yShift:  8,  dur: [1.2, 0.6, 0.10] },
  'ovation':     { tilt: -0.06, yShift: -14, dur: [0.4, 2.0, 0.8] },
  'stand-brief': { tilt: -0.04, yShift: -10, dur: [0.3, 0.8, 0.5] },
  'restless':    { tilt:  0,    yShift:  0,  dur: [0.2, 0.1, 0.3] },
};

const MOOD_AUD = {
  greeting:  { types: ['lean-fwd'],        chance: 0.45 },
  boast:     { types: ['lean-back'],        chance: 0.50 },
  conflict:  { types: ['lean-fwd', 'jolt'], chance: 0.65 },
  devotion:  { types: ['lean-back'],        chance: 0.50 },
  despair:   { types: ['lean-back'],        chance: 0.55 },
  madness:   { types: ['jolt'],             chance: 0.70 },
  prophecy:  { types: ['lean-fwd'],         chance: 0.55 },
  triumph:   { types: ['lean-fwd', 'jolt'], chance: 0.65 },
  farewell:  { types: ['lean-fwd'],         chance: 0.45 },
};

// --- Audience fade-in ---
let audienceFade = 0;       // 0 = invisible, 1 = fully visible
let audienceRevealed = false; // true once crank has been turned at least once

// --- Audience cue cards (stage-direction text below the audience) ---
const AUD_CUE_TEXT = {
  greeting:  ['Polite Applause', 'Murmuring'],
  boast:     ['Ooh!', 'Impressed Whispers'],
  conflict:  ['Gasps!', 'Oh!', 'Tension'],
  devotion:  ['Aww\u2026', 'Tender Sighs'],

};

let audienceCues = [];

function spawnAudienceCue(text) {
  for (const c of audienceCues) {
    if (c.phase !== 'exiting') { c.phase = 'exiting'; c.phaseT = 0; }
  }
  audienceCues.push({
    text, phase: 'entering', phaseT: 0,
    x: 320 + (Math.random() - 0.5) * 80, y: 516,
    rotation: (Math.random() - 0.5) * 0.025,
  });
}

// --- Bravo floats + ovation ---
let bravoFloats = [];
let ovationTriggered = false;
let stageFlowers = [];

const FLOWER_GLYPHS = ['✿', '❀', '✾', '❁', '✽', '❃'];
const FLOWER_COLORS = ['#c4565a', '#d4899a', '#e8c85a', '#e8a85a', '#ca82ca', '#fff8e0'];

function triggerFullOvation() {
  for (const m of AUDIENCE) {
    if (m.gone) continue;
    m.reaction = { type: 'ovation', delay: Math.random() * 0.3, elapsed: 0 };
  }
  spawnAudienceCue('Standing Ovation!');
  fireAudienceApplause();
  fireAudienceCheer();
  setTimeout(() => fireAudienceShout(), 300 + Math.random() * 500);
  setTimeout(() => fireAudienceShout(), 800 + Math.random() * 600);
  const texts = ['Bravo!', 'Brava!', 'Encore!', 'Huzzah!', 'Magnificent!'];
  for (let i = 0; i < 8; i++) {
    const idx = Math.floor(Math.random() * AUDIENCE.length);
    const am = AUDIENCE[idx];
    if (am.gone) continue;
    bravoFloats.push({
      text: texts[Math.floor(Math.random() * texts.length)],
      x: am.x + (Math.random() - 0.5) * 20,
      y: am.type === 'back' ? am.y - 25 : am.y - 15,
      vy: -18 - Math.random() * 15, vx: (Math.random() - 0.5) * 10,
      life: i * 0.3, maxLife: 3.0 + Math.random() * 1.5,
      size: 13 + Math.random() * 4, rot: (Math.random() - 0.5) * 0.15,
    });
  }
  // Throw flowers onto the stage!
  for (let i = 0; i < 18; i++) {
    const thrower = AUDIENCE[Math.floor(Math.random() * AUDIENCE.length)];
    if (thrower.gone) continue;
    // Target: random point on the stage top surface
    const ts = 0.15 + Math.random() * 0.7;  // s (left-right on stage)
    const tt = 0.2 + Math.random() * 0.6;   // t (front-back on stage)
    const landing = topPt(ts, tt);
    stageFlowers.push({
      x: thrower.x,
      y: thrower.type === 'back' ? thrower.y - 20 : thrower.y - 10,
      targetX: landing[0], targetY: landing[1],
      t: 0, dur: 0.5 + Math.random() * 0.5,
      delay: i * 0.10 + Math.random() * 0.25,
      glyph: FLOWER_GLYPHS[Math.floor(Math.random() * FLOWER_GLYPHS.length)],
      color: FLOWER_COLORS[Math.floor(Math.random() * FLOWER_COLORS.length)],
      size: 12 + Math.random() * 8,
      rot: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 5,
      landed: false,
      landedAlpha: 1.0,
    });
  }
}

function triggerAudienceReaction(beat) {
  if (!beat) return;

  if (beat.type === 'title') {
    for (const m of AUDIENCE) {
      if (m.gone) continue;
      m.reaction = { type: 'lean-fwd', delay: 0.1 + Math.random() * 0.3, elapsed: 0 };
    }
    spawnAudienceCue('Eager Murmuring');
    fireAudienceMurmur();
    return;
  }

  if (beat.type === 'fin') {
    for (const m of AUDIENCE) {
      if (m.gone) continue;
      m.reaction = { type: 'ovation', delay: 0.1 + Math.random() * 0.3, elapsed: 0 };
    }
    spawnAudienceCue('Thunderous Applause');
    fireAudienceApplause();
    if (Math.random() < 0.6) setTimeout(() => fireAudienceShout(), 400 + Math.random() * 800);
    return;
  }

  if (beat.type === 'act-title') {
    const rt = beat.act >= 2 ? 'stand-brief' : 'restless';
    for (const m of AUDIENCE) {
      if (m.gone || Math.random() > 0.70) continue;
      m.reaction = { type: rt, delay: Math.random() * 0.3, elapsed: 0,
        xTarget: rt === 'restless' ? (Math.random() - 0.5) * 8 : 0 };
    }
    spawnAudienceCue(beat.act >= 2 ? 'Applause' : 'Rustling');
    if (beat.act >= 2) fireAudienceApplause();
    else if (Math.random() < 0.35) fireAudienceCough(0.2 + Math.random() * 0.5);
    return;
  }

  if (beat.type === 'direction') return;

  if (beat.mood && MOOD_AUD[beat.mood]) {
    const ma = MOOD_AUD[beat.mood];
    if ((beat.mood === 'devotion' || beat.mood === 'despair') && Math.random() < 0.45) {
      const sleeper = AUDIENCE.find(m => m.personality === 'sleepy' && !m.gone && !m.reaction);
      if (sleeper) sleeper.reaction = { type: 'nod-off', delay: 0.3 + Math.random() * 0.5, elapsed: 0 };
    }
    if (beat.mood === 'despair' && Math.random() < 0.10) {
      const victim = AUDIENCE.find(m => m.type === 'back' && !m.gone && m.personality !== 'sleepy');
      if (victim) { victim.reaction = { type: 'walkout', delay: 0.3, elapsed: 0 }; return; }
    }
    for (const m of AUDIENCE) {
      if (m.gone || m.reaction) continue;
      if (Math.random() > ma.chance) continue;
      const type = ma.types[Math.floor(Math.random() * ma.types.length)];
      m.reaction = { type, delay: 0.15 + Math.random() * 0.4, elapsed: 0 };
    }
    if (Math.random() < 0.40) {
      const pool = AUD_CUE_TEXT[beat.mood];
      if (pool) spawnAudienceCue(pool[Math.floor(Math.random() * pool.length)]);
    }
    // Mood-specific sounds
    const moodSound = {
      greeting: () => { if (Math.random() < 0.35) fireAudienceMurmur(); },
      boast:    () => { if (Math.random() < 0.30) fireAudienceMurmur();
                        if (Math.random() < 0.15) fireAudienceShout(); },
      conflict: () => { if (Math.random() < 0.50) fireAudienceGasp(); },
      devotion: () => { if (Math.random() < 0.45) fireAudienceSigh(); },
      despair:  () => { if (Math.random() < 0.40) fireAudienceSigh(); },
      madness:  () => { if (Math.random() < 0.50) fireAudienceGasp();
                        if (Math.random() < 0.10) fireAudienceShout(); },
      prophecy: () => { /* silence — a hush */ },
      triumph:  () => { if (Math.random() < 0.40) fireAudienceShout();
                        if (Math.random() < 0.25) fireAudienceApplause(); },
      farewell: () => { if (Math.random() < 0.40) fireAudienceSigh();
                        if (Math.random() < 0.15) fireAudienceCough(0.3); },
    };
    const fn = moodSound[beat.mood];
    if (fn) fn();
  }
}

function resetAudience() {
  for (const m of AUDIENCE) {
    m.tilt = 0; m.yShift = 0; m.xShift = 0;
    m.reaction = null; m.gone = false;
  }
  audienceCues = [];
  bravoFloats = [];
  stageFlowers = [];
  ovationTriggered = false;
  audienceFade = 0;
  audienceRevealed = false;
}

function updateAudience(dt) {
  for (const m of AUDIENCE) {
    if (m.gone) continue;
    if (!m.reaction) continue;

    m.reaction.elapsed += dt;
    const r = m.reaction;

    if (r.type === 'walkout') {
      const t = Math.max(0, r.elapsed - r.delay);
      if (t > 0) m.yShift = t * t * 25;
      if (m.yShift > 60) { m.gone = true; m.reaction = null; }
      continue;
    }

    const def = AUD_REACTIONS[r.type];
    if (!def) { m.reaction = null; continue; }
    const [up, hold, down] = def.dur;
    const total = r.delay + up + hold + down;
    const t = r.elapsed;

    if (t < r.delay) {
      // Waiting
    } else if (t < r.delay + up) {
      const p = (t - r.delay) / up;
      const e = p * p * (3 - 2 * p);
      m.tilt   = def.tilt * e;
      m.yShift = def.yShift * e;
      if (r.xTarget) m.xShift = r.xTarget * e;
    } else if (t < r.delay + up + hold) {
      m.tilt   = def.tilt;
      m.yShift = def.yShift;
      if (r.xTarget) m.xShift = r.xTarget;
    } else if (t < total) {
      const p = (t - r.delay - up - hold) / down;
      const e = 1 - p * p * (3 - 2 * p);
      m.tilt   = def.tilt * e;
      m.yShift = def.yShift * e;
      if (r.xTarget) m.xShift = r.xTarget * e;
    } else {
      m.tilt = 0; m.yShift = 0; m.xShift = 0;
      m.reaction = null;
    }
  }

  // Update audience cue cards
  for (const c of audienceCues) {
    c.phaseT += dt;
    if (c.phase === 'entering' && c.phaseT >= 0.3) { c.phase = 'holding'; c.phaseT = 0; }
    if (c.phase === 'holding' && c.phaseT >= 1.8) { c.phase = 'exiting'; c.phaseT = 0; }
    if (c.phase === 'exiting' && c.phaseT >= 0.5) { c.phase = 'gone'; }
  }
  audienceCues = audienceCues.filter(c => c.phase !== 'gone');

  // Update bravo floats
  for (const b of bravoFloats) {
    b.life += dt;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.vy *= 0.97;
  }
  bravoFloats = bravoFloats.filter(b => b.life < b.maxLife);

  // Update stage flowers (parabolic arcs, then rest on stage)
  for (const f of stageFlowers) {
    if (f.landed) {
      f.landedAlpha = Math.max(0, f.landedAlpha - dt * 0.04); // very slow fade
      continue;
    }
    if (f.delay > 0) { f.delay -= dt; continue; }
    f.t += dt / f.dur;
    if (f.t >= 1) { f.t = 1; f.landed = true; }
    f.rot += f.spin * dt;
  }
  stageFlowers = stageFlowers.filter(f => !f.landed || f.landedAlpha > 0.01);

  // Audience fade-in
  if (audienceRevealed && audienceFade < 1) {
    audienceFade = Math.min(1, audienceFade + dt * 0.5);
  }
}

function drawAudience(ts, group) {
  if (audienceFade < 0.01) return;
  const t = ts * 0.001;
  ctx.save();
  ctx.globalAlpha = audienceFade;
  for (const m of AUDIENCE) {
    if (m.gone) continue;
    if (group === 'sides' && m.type !== 'profile') continue;
    if (group === 'bottom' && m.type !== 'back') continue;
    const sway = Math.sin(t * m.swayFreq + m.swayPhase) * m.swayAmp;

    ctx.save();
    ctx.translate(m.x + m.xShift, m.y + m.yShift);
    ctx.rotate(sway + m.tilt);
    ctx.scale(m.scale, m.scale);

    if (m.type === 'back') {
      traceBackShape(BACK_VARS[m.variant]);
    } else {
      if (m.facing < 0) ctx.scale(-1, 1);
      traceProfileShape(PROF_VARS[m.variant]);
    }

    ctx.fillStyle = '#342c22';
    ctx.fill();

    const v = m.type === 'back' ? BACK_VARS[m.variant] : PROF_VARS[m.variant];
    const h = m.type === 'back'
      ? v.sh + v.nh + v.hh + (v.crown === 'hat' ? 13 : v.crown === 'bun' ? 5 : 3)
      : v.bodyH + v.neckL + v.headH + (v.crown === 'bun' ? 4 : 2);
    const grd = ctx.createLinearGradient(0, -h, 0, 0);
    grd.addColorStop(0, 'rgba(90,75,50,0.22)');
    grd.addColorStop(0.5, 'rgba(55,45,30,0.10)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fill();

    ctx.restore();
  }
  ctx.restore();
}

function drawAudienceCues() {
  for (const c of audienceCues) {
    let alpha;
    if (c.phase === 'entering') alpha = easeOut(Math.min(c.phaseT / 0.3, 1));
    else if (c.phase === 'holding') alpha = 0.80;
    else if (c.phase === 'exiting') alpha = 0.80 * (1 - easeIn(Math.min(c.phaseT / 0.5, 1)));
    else continue;
    if (alpha < 0.01) continue;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rotation);
    ctx.font = 'italic 17px Georgia, "Times New Roman", serif';
    ctx.fillStyle = '#c8b898';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.text, 0, 0);
    ctx.restore();
  }
}

function drawBravoFloats() {
  for (const b of bravoFloats) {
    const t = b.life / b.maxLife;
    const a = t < 0.15 ? t / 0.15 : t > 0.7 ? (1 - t) / 0.3 : 1.0;
    if (a <= 0.01) continue;
    ctx.save();
    ctx.globalAlpha = a * 0.85;
    ctx.translate(b.x, b.y);
    ctx.rotate(b.rot);
    ctx.font = 'bold ' + b.size + 'px Georgia, "Times New Roman", serif';
    ctx.fillStyle = '#d4c4a0';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.text, 0, 0);
    ctx.restore();
  }
}

function drawStageFlowers() {
  for (const f of stageFlowers) {
    if (f.delay > 0) continue;
    let x, y, alpha;
    if (!f.landed) {
      // Parabolic arc from thrower to stage
      const p = f.t;
      const ep = p * p * (3 - 2 * p); // smoothstep
      x = f.x + (f.targetX - f.x) * ep;
      // Arc height: peaks at midpoint, proportional to distance
      const arcH = -80 - Math.abs(f.targetX - f.x) * 0.15;
      y = f.y + (f.targetY - f.y) * ep + arcH * 4 * p * (1 - p);
      alpha = 0.9;
    } else {
      x = f.targetX;
      y = f.targetY;
      alpha = f.landedAlpha * 0.8;
    }
    if (alpha < 0.01) continue;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    ctx.rotate(f.rot);
    ctx.font = f.size + 'px serif';
    ctx.fillStyle = f.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.glyph, 0, 0);
    ctx.restore();
  }
}

// --- Audience sounds ---

function fireAudienceMurmur() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const len = audioCtx.sampleRate * 0.4 | 0;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 450; bp.Q.value = 0.6;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(0.20, t0 + 0.04);
  g.gain.linearRampToValueAtTime(0.14, t0 + 0.20);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.38);
  src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
  src.start(t0); src.stop(t0 + 0.42);
}

function fireAudienceCough(delay) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + (delay || 0);
  const len = audioCtx.sampleRate * 0.15 | 0;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 700; bp.Q.value = 1.0;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(0.25, t0 + 0.006);
  g.gain.exponentialRampToValueAtTime(0.04, t0 + 0.04);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.13);
  src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
  src.start(t0); src.stop(t0 + 0.16);
}

function fireAudienceApplause() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  // Realistic applause: sparse tentative claps → dense peak → tapering off
  const totalDur = 3.2;
  const clapCount = 90;
  for (let i = 0; i < clapCount; i++) {
    // Shape the timing: claps cluster toward the middle, sparse at start/end
    const raw = Math.random();
    // Beta-ish distribution: peaks around 35% through
    const shaped = Math.pow(raw, 0.6) * totalDur;
    const delay = shaped;
    // Volume envelope: ramp up 0-0.8s, peak 0.8-1.8s, fade 1.8-3.2s
    let envelope;
    if (delay < 0.8) envelope = 0.3 + 0.7 * (delay / 0.8);
    else if (delay < 1.8) envelope = 1.0;
    else envelope = Math.max(0.05, (totalDur - delay) / (totalDur - 1.8));
    // Clap rate also accelerates: early claps are longer (more tentative)
    const tentative = delay < 0.6 ? 1.4 : 1.0;
    const vol = (0.05 + Math.random() * 0.07) * envelope;
    const dur = (0.010 + Math.random() * 0.014) * tentative;
    const len = audioCtx.sampleRate * dur | 0;
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let j = 0; j < d.length; j++) d[j] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 1000 + Math.random() * 1500; hp.Q.value = 0.3 + Math.random() * 0.4;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, t0 + delay);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + delay + dur);
    src.connect(hp); hp.connect(g); g.connect(audioCtx.destination);
    src.start(t0 + delay); src.stop(t0 + delay + dur + 0.01);
  }
  // Layer 2: crowd wash follows same envelope
  const washLen = audioCtx.sampleRate * totalDur | 0;
  const washBuf = audioCtx.createBuffer(1, washLen, audioCtx.sampleRate);
  const wd = washBuf.getChannelData(0);
  for (let i = 0; i < wd.length; i++) wd[i] = Math.random() * 2 - 1;
  const washSrc = audioCtx.createBufferSource(); washSrc.buffer = washBuf;
  const washBP = audioCtx.createBiquadFilter();
  washBP.type = 'bandpass'; washBP.frequency.value = 800; washBP.Q.value = 0.3;
  const washG = audioCtx.createGain();
  washG.gain.setValueAtTime(0, t0);
  washG.gain.linearRampToValueAtTime(0.04, t0 + 0.4);
  washG.gain.linearRampToValueAtTime(0.12, t0 + 0.9);
  washG.gain.linearRampToValueAtTime(0.10, t0 + 2.0);
  washG.gain.exponentialRampToValueAtTime(0.0001, t0 + totalDur - 0.1);
  washSrc.connect(washBP); washBP.connect(washG); washG.connect(audioCtx.destination);
  washSrc.start(t0); washSrc.stop(t0 + totalDur);
}

function fireAudienceCheer() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const len = audioCtx.sampleRate * 2.0 | 0;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 700; bp.Q.value = 0.35;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(0.22, t0 + 0.25);
  g.gain.linearRampToValueAtTime(0.18, t0 + 1.0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.8);
  src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
  src.start(t0); src.stop(t0 + 2.0);
}

// Sharp collective intake of breath
function fireAudienceGasp() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const len = audioCtx.sampleRate * 0.25 | 0;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  // High-pitched breathy burst
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 2500; hp.Q.value = 0.5;
  const bp = audioCtx.createBiquadFilter();

  const g = audioCtx.createGain();

  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.22);
  src.connect(hp); hp.connect(bp); bp.connect(g); g.connect(audioCtx.destination);

// Soft collective sigh — gentle low wash
function fireAudienceSigh() {

  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);

// Lone shout from the crowd — "Bravo!" energy
function fireAudienceShout() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  // Use oscillator for a pitched vocal quality
  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(180 + Math.random() * 80, t0);
  osc.frequency.linearRampToValueAtTime(140 + Math.random() * 40, t0 + 0.3);
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 800 + Math.random() * 400; bp.Q.value = 2.0;
  // Add some noise for breathiness
  const nLen = audioCtx.sampleRate * 0.4 | 0;
  const nBuf = audioCtx.createBuffer(1, nLen, audioCtx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  const nSrc = audioCtx.createBufferSource(); nSrc.buffer = nBuf;
  const nBp = audioCtx.createBiquadFilter();
  nBp.type = 'bandpass'; nBp.frequency.value = 1200; nBp.Q.value = 0.5;
  const nG = audioCtx.createGain();
  nG.gain.setValueAtTime(0, t0);
  nG.gain.linearRampToValueAtTime(0.08, t0 + 0.03);
  nG.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.30);
  nSrc.connect(nBp); nBp.connect(nG); nG.connect(audioCtx.destination);
  nSrc.start(t0); nSrc.stop(t0 + 0.35);
  // Oscillator (the "voice")
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(0.12, t0 + 0.02);
  g.gain.linearRampToValueAtTime(0.09, t0 + 0.15);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.32);
  osc.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + 0.35);
}

let audioCtx  = null;

const HUSH_DUR = 3.0; // total hush duration (must match value set in activateBeat)

// Fire a single soft tick: a brief noise burst filtered to a thin click.
function fireTick() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 3200; hp.Q.value = 0.8;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 7000; lp.Q.value = 0.5;
  const g  = audioCtx.createGain();
  g.gain.setValueAtTime(0.09, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.018);
  src.connect(hp); hp.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
  src.start(t0); src.stop(t0 + 0.04);
}

const KALIMBA_CORE = [293.66, 311.13, 349.23, 392.00, 440.00, 466.16, 523.25];
const KALIMBA_HIGH = [587.33, 622.25, 698.46, 783.99, 880.00];

function pluckNote(freq, vol, delay) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + (delay || 0);

  const osc1 = audioCtx.createOscillator(), gain1 = audioCtx.createGain();
  osc1.type = 'triangle';
  osc1.frequency.setValueAtTime(freq, t0);
  osc1.frequency.exponentialRampToValueAtTime(freq * 0.993, t0 + 0.06);
  gain1.gain.setValueAtTime(0, t0);
  gain1.gain.linearRampToValueAtTime(vol, t0 + 0.005);
  gain1.gain.setValueAtTime(vol * 0.82, t0 + 0.018);
  gain1.gain.exponentialRampToValueAtTime(0.0001, t0 + 2.0);
  osc1.connect(gain1); gain1.connect(audioCtx.destination);
  osc1.start(t0); osc1.stop(t0 + 2.1);

  const osc2 = audioCtx.createOscillator(), gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2.018, t0);
  gain2.gain.setValueAtTime(0, t0);
  gain2.gain.linearRampToValueAtTime(vol * 0.18, t0 + 0.005);
  gain2.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.9);
  osc2.connect(gain2); gain2.connect(audioCtx.destination);
  osc2.start(t0); osc2.stop(t0 + 1.0);
}

function triggerNote() {
  if (!audioCtx) return;
  const m = MOOD_MUSIC[suffusion.mood] || MOOD_MUSIC.greeting;
  const pool = Math.random() < m.highCh ? KALIMBA_HIGH : KALIMBA_CORE;
  const freq = pool[Math.floor(Math.random() * pool.length)];
  pluckNote(freq, m.vol);
  if (Math.random() < m.harmCh) {
    const hFreq = freq * (Math.random() < 0.55 ? m.harmR : 1.5);
    if (hFreq < 1200) pluckNote(hFreq, m.vol * 0.45, 0.045);
  }
  noteTimer = m.minGap + Math.random() * m.gapRng;
}

// A small tinkly bell between acts — sine partials at inharmonic bell ratios.
function playActEndBell() {
  if (!audioCtx) return;
  const t0   = audioCtx.currentTime;
  const fund = 1046.50; // C6 — small, high, fits a tiny stage bell
  const parts = [
    { ratio: 1.000, vol: 0.17, decay: 2.2 },
    { ratio: 2.756, vol: 0.09, decay: 1.1 },
    { ratio: 5.404, vol: 0.05, decay: 0.6 },
  ];
  for (const { ratio, vol, decay } of parts) {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(fund * ratio, t0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + 0.004);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + decay);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + decay + 0.05);
  }
}

function poly(pts, fill, stroke, lw) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  if (fill)   { ctx.fillStyle   = fill;   ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw||1.5; ctx.stroke(); }
}

function pline(x1, y1, x2, y2, w) {
  ctx.globalAlpha = 0.88; ctx.lineWidth = w;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.globalAlpha = 0.28; ctx.lineWidth = w * 0.45;
  ctx.beginPath(); ctx.moveTo(x1+0.6,y1+0.4); ctx.lineTo(x2+0.6,y2+0.4); ctx.stroke();
  ctx.globalAlpha = 1.0;
}

function withAlpha(a, fn) { ctx.save(); ctx.globalAlpha = a; fn(); ctx.restore(); }

function drawDustMotes(ts) {
  ctx.save();
  const t = ts * 0.001;
  for (const m of DUST) {
    const x = m.x + Math.sin(t * m.vx + m.ph) * m.ax;
    const y = m.y + Math.cos(t * m.vy + m.ph * 1.3) * m.ay;
    // Slow opacity breathe — much gentler than star twinkle
    const breathe = 0.75 + 0.25 * Math.sin(t * 0.3 + m.ph);
    ctx.globalAlpha = m.a * breathe;
    ctx.fillStyle = '#c4a87a';
    ctx.beginPath(); ctx.arc(x, y, m.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawBackdrop() {
  const x0 = btl[0], x1 = btr[0];
  const slide = sceneYOffset();   // backdrop sinks down during scene transition
  const y0 = btl[1] - BACKDROP_H + slide;
  const w  = x1 - x0, h = BACKDROP_H;

  // Clip to the backdrop region so it doesn't paint over the stage top as it sinks
  ctx.save();
  ctx.beginPath();
  ctx.rect(x0, btl[1] - BACKDROP_H, w, BACKDROP_H);
  ctx.clip();

  ctx.fillStyle = backdropWashColor() || '#d8ccaa';
  ctx.fillRect(x0, y0, w, h);

  const img = backdropImgs[backdropIdx];
  if (img.complete && img.naturalWidth > 0) {
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    ctx.drawImage(img, x0, y0, w, h);
    ctx.restore();
  }
  ctx.restore();
}

function drawStageTop() {
  poly([ftl, ftr, btr, btl], '#8a8070', null);
  drawWoodGrain([ftl, ftr, btr, btl], 0.68);
  // Vignette: darken back edge and side edges
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ftl[0], ftl[1]); ctx.lineTo(ftr[0], ftr[1]);
  ctx.lineTo(btr[0], btr[1]); ctx.lineTo(btl[0], btl[1]);
  ctx.closePath(); ctx.clip();
  const gBack = ctx.createLinearGradient(0, btl[1], 0, ftl[1]);
  gBack.addColorStop(0, 'rgba(0,0,0,0.55)');
  gBack.addColorStop(0.7, 'rgba(0,0,0,0)');
  ctx.fillStyle = gBack; ctx.fillRect(0, btl[1], 640, ftl[1] - btl[1]);
  const gL = ctx.createLinearGradient(ftl[0], 0, ftl[0] + 30, 0);
  gL.addColorStop(0, 'rgba(0,0,0,0.35)'); gL.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gL; ctx.fillRect(ftl[0], btl[1], 35, ftl[1] - btl[1]);
  const gR = ctx.createLinearGradient(ftr[0], 0, ftr[0] - 30, 0);
  gR.addColorStop(0, 'rgba(0,0,0,0.35)'); gR.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gR; ctx.fillRect(ftr[0] - 35, btl[1], 35, ftl[1] - btl[1]);
  ctx.restore();
}

function drawTopEdges() {
  ctx.strokeStyle = '#1a1206';
  pline(ftr[0],ftr[1], btr[0],btr[1], 1.8);
  pline(btr[0],btr[1], btl[0],btl[1], 1.8);
  pline(btl[0],btl[1], ftl[0],ftl[1], 1.8);
}

function drawLid(openT) {
  // Lid rotates around the back hinge (btl/btr) like a laptop opening.
  // openT=0: closed (flat on stage top). openT=1: fully open (~104°, inside faces viewer).
  const theta = easeOut(openT) * LID_OPEN_ANGLE;
  const cosT  = Math.cos(theta);
  const sinT  = Math.sin(theta);
  const ARM_Y = ftl[1] - btl[1]; // depth arm in screen space when closed (≈59 px)
  const RISE  = BACKDROP_H;       // real vertical travel = backdrop height
  const frontY = btl[1] + ARM_Y * cosT - RISE * sinT;
  const fl = [ftl[0], frontY], fr = [ftr[0], frontY];

  if (theta < Math.PI / 2) {
    // Outside of lid visible (wooden top face, foreshortening as it rotates up)
    poly([fl, fr, btr, btl], '#8a8070', null);
    drawWoodGrain([fl, fr, btr, btl], 0.68);
  } else {
    // Inside of lid visible — draw the backdrop image on the inner face
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(fl[0], fl[1]); ctx.lineTo(fr[0], fr[1]);
    ctx.lineTo(btr[0], btr[1]); ctx.lineTo(btl[0], btl[1]);
    ctx.closePath(); ctx.clip();
    ctx.fillStyle = '#d8ccaa'; ctx.fill();
    const img = backdropImgs[backdropIdx];
    if (img.complete && img.naturalWidth > 0) {
      ctx.globalCompositeOperation = 'multiply';
      ctx.drawImage(img, btl[0], frontY, btr[0] - btl[0], btl[1] - frontY);
    }
    ctx.restore();
  }
}

function drawFrontFace() {
  poly([ftl, ftr, fbr, fbl], '#7a7060', null);
  drawWoodGrain([ftl, ftr, fbr, fbl], 0.68);
  // Vignette: darken left, right, and bottom edges
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ftl[0], ftl[1]); ctx.lineTo(ftr[0], ftr[1]);
  ctx.lineTo(fbr[0], fbr[1]); ctx.lineTo(fbl[0], fbl[1]);
  ctx.closePath(); ctx.clip();
  const W  = ftr[0] - ftl[0];
  const ew = W * 0.17;
  const gL = ctx.createLinearGradient(ftl[0], 0, ftl[0] + ew, 0);
  gL.addColorStop(0, 'rgba(0,0,0,0.50)'); gL.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gL; ctx.fillRect(ftl[0], ftl[1], ew, fbl[1] - ftl[1]);
  const gR = ctx.createLinearGradient(ftr[0], 0, ftr[0] - ew, 0);
  gR.addColorStop(0, 'rgba(0,0,0,0.50)'); gR.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gR; ctx.fillRect(ftr[0] - ew, ftl[1], ew, fbl[1] - ftl[1]);
  const gB = ctx.createLinearGradient(0, fbl[1], 0, fbl[1] - 42);
  gB.addColorStop(0, 'rgba(0,0,0,0.44)'); gB.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gB; ctx.fillRect(ftl[0], fbl[1] - 46, W, 46);
  ctx.restore();
}

function drawFrontEdges() {
  ctx.strokeStyle = '#1a1206';

function drawSlotTrack(p) {
  const N = 80;
  ctx.beginPath();
  for (let i = 0; i <= N; i++) {
    const pt = p.track.pt((i / N) * Math.PI * 2);
    if (i === 0) ctx.moveTo(pt[0], pt[1]); else ctx.lineTo(pt[0], pt[1]);
  }
  ctx.closePath();
  ctx.strokeStyle = '#150f04'; ctx.lineWidth = 3; ctx.stroke();
}

function drawCrankArm() {

  ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(kx,ky); ctx.stroke();
  ctx.fillStyle = '#150f04'; ctx.strokeStyle = '#1a1206'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(kx, ky, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
}

function drawPuppet(p, yOffset, alpha, cardTint) {
  const PUPPET_SCALE = 1.125;
  const stickH = 52 * PUPPET_SCALE;     // ~58.5 px

  const pos      = p.track.pt(p.angle);
  const posAhead = p.track.pt(p.angle + 0.01);
  const dx       = posAhead[0] - pos[0];
  const dy       = posAhead[1] - pos[1];
  const facing   = Math.atan2(dy, dx);
  // -cos(facing): full width when moving horizontally, edge-on when moving into/out of stage
  // Sign naturally handles facing direction (negative = face left, positive = face right)
  const rawScale = -Math.cos(facing);
  const MIN_CARD_SCALE = 0.15;
  const sign     = Math.sign(rawScale) || 1;
  const scaleX   = sign * Math.max(Math.abs(rawScale), MIN_CARD_SCALE);

  const bob      = p.bob(p.angle) * PUPPET_SCALE;
  const waggle   = p.waggle(p.angle);
  const cardTilt = p.cardTilt(p.angle);

  ctx.save();
  ctx.globalAlpha = (alpha !== undefined) ? alpha : 1;
  ctx.translate(pos[0], pos[1] + yOffset);
  ctx.rotate(waggle);

  ctx.strokeStyle = '#150f04'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, bob - stickH); ctx.stroke();
  ctx.lineCap = 'butt';

  ctx.save();
  ctx.translate(0, bob - stickH);
  ctx.rotate(cardTilt);

  const bx = -p.cardW / 2, by = -p.cardH;

  if (p.img) {
    ctx.save();
    ctx.scale(scaleX, 1);
    ctx.drawImage(p.img, bx, by, p.cardW, p.cardH);
    ctx.restore();
  }

  ctx.restore();
  ctx.restore();
}

function wrapText(text, font, maxW) {
  ctx.font = font;
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function drawCueCards(ts) {
  if (openState !== 'playing' && openState !== 'open') return;

  const CUE_Y = 55;
  const CUE_X = 320;
  const FONT_LINE    = 'italic 15px Georgia, "Times New Roman", serif';
  const FONT_SPEAKER = 'bold 11px Georgia, "Times New Roman", serif';
  const FONT_DIR     = 'italic 13px Georgia, "Times New Roman", serif';
  const FONT_ACT     = '20px Georgia, "Times New Roman", serif';

  for (const c of cueCards) {
    let alpha, yShift = 0;

    if (c.phase === 'entering') {
      const t = Math.min(c.phaseT / 0.4, 1);
      alpha = easeOut(t);
      yShift = (1 - t) * 5;
    } else if (c.phase === 'holding') {
      alpha = 1;
      yShift = Math.sin(ts * 0.001 * 0.8) * 1;
    } else if (c.phase === 'exiting') {
      const t = Math.min(c.phaseT / 0.8, 1);
      alpha = 1 - easeIn(t);
      yShift = -t * 10;
    } else continue;

    if (alpha <= 0.01) continue;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(CUE_X, CUE_Y + yShift);
    ctx.rotate(c.rotation);

    if (c.type === 'act-title' || c.type === 'title' || c.type === 'fin') {
      const isTitle = c.type === 'title';
      const isFin   = c.type === 'fin';
      ctx.font = isTitle ? 'italic 24px Georgia, "Times New Roman", serif'
               : isFin   ? 'italic 19px Georgia, "Times New Roman", serif'
               :            FONT_ACT;
      ctx.fillStyle = isTitle ? '#b8a878' : '#c8b88a';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 6;
      ctx.fillText(c.text, 0, 0);
      ctx.shadowBlur = 0;
    } else {
      const isDir  = c.type === 'direction';
      const font   = isDir ? FONT_DIR : FONT_LINE;
      const lines  = wrapText(c.text, font, 360);
      const lineH  = isDir ? 16 : 19;
      const padX   = 18, padY = 10;

      let speakerName = null;
      if (c.type === 'line' && c.speaker !== null && perf.length > c.speaker) {
        speakerName = perf[c.speaker].name;
      }
      const speakerH = speakerName ? 16 : 0;

      ctx.font = font;
      const textW = Math.max(...lines.map(l => ctx.measureText(l).width));
      let headerW = 0;
      if (speakerName) { ctx.font = FONT_SPEAKER; headerW = ctx.measureText(speakerName).width; }
      const cardW = Math.max(textW, headerW) + padX * 2;
      const cardH = speakerH + lines.length * lineH + padY * 2;

      const rx = -cardW / 2, ry = -cardH / 2;

      // Card shadow
      ctx.shadowColor = 'rgba(0,0,0,0.35)';
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 2;
      ctx.fillStyle = '#ede4c8';
      ctx.beginPath(); ctx.rect(rx, ry, cardW, cardH); ctx.fill();
      ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

      ctx.strokeStyle = 'rgba(26,18,6,0.4)';
      ctx.lineWidth = 0.7;
      ctx.stroke();

      let ty = ry + padY;
      if (speakerName) {
        ctx.font = FONT_SPEAKER;
        ctx.fillStyle = '#6a5a3a';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(speakerName, rx + padX, ty);
        ty += speakerH;
      }

      ctx.font = font;
      ctx.fillStyle = '#2a1e08';
      ctx.textBaseline = 'top';
      for (const ln of lines) {
        if (isDir) { ctx.textAlign = 'center'; ctx.fillText(ln, 0, ty); }
        else       { ctx.textAlign = 'left';   ctx.fillText(ln, rx + padX, ty); }
        ty += lineH;
      }
    }

    ctx.restore();
  }
}

// =============================================================================
// MAIN LOOP
// =============================================================================

function draw(ts) {
  const dt = lastT === null ? 0 : Math.min((ts - lastT) / 1000, 0.08);
  lastT = ts;

  // Advance opening animation
  if (openState === 'opening') {
    openT += dt / OPEN_DUR;
    if (openT >= 1) { openT = 1; openState = 'open'; }
  }

  // Advance crank (puppets wind down after play ends)
  if (running) {
    if (playEnded) windDown = Math.max(0, windDown - dt * 0.35);
    if (playEnded && windDown < 0.08 && !ovationTriggered) {
      ovationTriggered = true;
      triggerFullOvation();
    }
    // Inter-act hush: decelerate over first 0.5s, pause, accelerate over last 0.5s
    const RAMP = 0.5;
    let hushMult = 1;
    if (musicHush > 0) {
      const elapsed = HUSH_DUR - musicHush;
      if (elapsed < RAMP)              hushMult = 1 - (elapsed / RAMP);        // decel
      else if (musicHush < RAMP)       hushMult = 1 - (musicHush / RAMP);      // accel
      else                             hushMult = 0;                            // paused
    }
    const dir = shiftHeld ? -1 : 1;
    for (const p of perf) p.angle += SPEED * dt * dir * windDown * hushMult;
    crankA += SPEED * dt * 2.0 * dir;
    if (!shiftHeld && windDown > 0.05) {
      if (musicHush > 0) {
        musicHush -= dt;
      } else {
        noteTimer -= dt;
        if (noteTimer <= 0) triggerNote();
      }
    }
    if (windDown > 0.05) {
      tickTimer -= dt;
      if (tickTimer <= 0) {
        fireTick();
        tickTimer = 0.06 + Math.random() * 0.08;
      }
    }
  }

  // Advance character transition
  if (transPhase !== 'idle') {
    transT += dt / TRANS_DUR;
    if (transT >= 1) {
      if (transPhase === 'exiting') {
        perf       = pendingPerf;
        pendingPerf = null;
        transPhase  = 'entering';
        transT      = 0;
      } else {
        transPhase = 'idle';
        transT     = 0;
        if (openState === 'open') openState = 'playing';
        startPlay();
      }
    }
  }

  // Advance scene transition
  if (sceneTransPhase !== 'idle') {
    sceneTransT += dt / SCENE_TRANS_DUR;
    if (sceneTransT >= 1) {
      if (sceneTransPhase === 'exiting') {
        backdropIdx     = pendingBackdrop;
        pendingBackdrop = -1;
        sceneTransPhase = 'entering';
        sceneTransT     = 0;
      } else {
        sceneTransPhase = 'idle';
        sceneTransT     = 0;
        if (openState === 'playing') startPlay();
      }
    }
  }

  // Advance play
  if (running && playScript.length > 0 && openState === 'playing') {
    const dir = shiftHeld ? -1 : 1;
    playCrankAccum += SPEED * dt * dir;
    const thresh = BEAT_BASE * beatPace(playBeatIdx);
    if (playCrankAccum >= thresh) {
      playCrankAccum -= thresh;
      if (playBeatIdx < playScript.length - 1) {
        playBeatIdx++;
        activateBeat(playScript[playBeatIdx]);
      } else if (playBeatIdx === playScript.length - 1) {
        playBeatIdx++;
        playEnded = true;
        activateBeat(null);
      }
    } else if (playCrankAccum < 0) {
      if (playBeatIdx >= playScript.length) {
        playBeatIdx = playScript.length - 1;
        playCrankAccum += BEAT_BASE * beatPace(playBeatIdx);
        playEnded = false;
        windDown  = 1.0;
        activateBeat(playScript[playBeatIdx]);
      } else if (playBeatIdx > 0) {
        playBeatIdx--;
        playCrankAccum += BEAT_BASE * beatPace(playBeatIdx);
        activateBeat(playScript[playBeatIdx]);
      } else {
        playCrankAccum = 0;
      }
    }
  }

  // Update cue cards and suffusion
  for (const c of cueCards) {
    c.phaseT += dt;
    if (c.phase === 'entering' && c.phaseT >= 0.4) { c.phase = 'holding'; c.phaseT = 0; }
    if (c.phase === 'exiting'  && c.phaseT >= 0.8) { c.phase = 'gone'; }
  }
  cueCards = cueCards.filter(c => c.phase !== 'gone');
  updateSuffusion();

  // Update emotion particles
  for (const ep of emotionParticles) {
    ep.life += dt;
    ep.x += ep.vx * dt;
    ep.y += ep.vy * dt;
    ep.vy *= 0.97;
    ep.rot += ep.rotV * dt;
  }
  emotionParticles = emotionParticles.filter(ep => ep.life < ep.maxLife);

  updateAudience(dt);

  const yOff  = currentYOffset();
  const alpha = currentAlpha();

  const DIM = 0.28;

  // --- Render ---
  ctx.fillStyle = '#0e0b08';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Dust motes drifting in the dark surround
  drawDustMotes(ts);

  // Side audience: behind the stage, in the dark surround
  drawAudience(ts, 'sides');

  // Backdrop: static once open; during opening the lid itself shows the image
  if (openState === 'open' || openState === 'playing') drawBackdrop();

  // Stage surface
  drawStageTop();

  // Slot groove drawn once (both puppets share the same track)
  if (perf[0]) drawSlotTrack(perf[0]);
  const sorted = [...perf].sort((a, b) =>
    a.track.pt(a.angle)[1] - b.track.pt(b.angle)[1]
  );
  for (const p of sorted) {
    const tint = cardTintForPuppet(perf.indexOf(p));
    drawPuppet(p, yOff, alpha, tint);
  }

  // Flowers landing on stage (drawn above stage surface, below lid/front face)
  drawStageFlowers();

  // Lid rotates open like a laptop, revealing backdrop on inside face
  if (openState === 'closed') drawLid(0);
  else if (openState === 'opening') drawLid(openT);

  // Front face covers characters that descend into it during transitions
  drawFrontFace();

  // Buttons (dimmed until unlocked)
  withAlpha(isEnabled('scene') ? 1 : DIM, drawSceneButton);
  withAlpha(isEnabled('pick')  ? 1 : DIM, drawPickButton);
  // Crank housing drawn here, arm drawn absolutely last so it clears the stage edge
  withAlpha(isEnabled('crank') ? 1 : DIM, drawCrankHousing);
  withAlpha(isEnabled('crank') ? 1 : DIM, drawCrankArm);

  drawAudience(ts, 'bottom');
  drawAudienceCues();
  drawBravoFloats();

  drawEmotionParticles();
  drawCueCards(ts);

  requestAnimationFrame(draw);
}

// =============================================================================
// INPUT
// =============================================================================

function getCanvasPos(e) {
  const r = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return [(cx - r.left) * canvas.width  / r.width,
          (cy - r.top)  * canvas.height / r.height];
}

function inCircle(x, y, cx, cy) {
  const dx = x-cx, dy = y-cy;
  return dx*dx + dy*dy <= HIT_R * HIT_R;
}

function handleInputDown(e) {
  if (!audioCtx) {
    audioCtx = new AudioContext();
  } else if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  const [x, y] = getCanvasPos(e);

  if (isEnabled('crank') && inCircle(x, y, AXLE[0], AXLE[1])) {
    running = true; lastT = null;
    if (!audienceRevealed) audienceRevealed = true;
    if (noteTimer <= 0) noteTimer = 0.05;

  } else if (isEnabled('pick') && inCircle(x, y, PICK_BTN[0], PICK_BTN[1])) {
    if (openState === 'open' && transPhase === 'idle') {
      perf       = makeNewPair();
      transPhase = 'entering';
      transT     = 0;
    } else if (openState === 'playing') {
      startTransition();
    }

  } else if (isEnabled('scene') && inCircle(x, y, SCENE_BTN[0], SCENE_BTN[1])) {
    if (openState === 'closed') {
      openState = 'opening';
      openT     = 0;
    } else {
      startSceneTransition();
    }
  }
}

function handleInputUp() { running = false; }

canvas.addEventListener('mousedown', handleInputDown);
canvas.addEventListener('mouseup',    handleInputUp);
canvas.addEventListener('mouseleave', handleInputUp);
canvas.addEventListener('mousemove', e => {
  const [x, y] = getCanvasPos(e);
  canvas.style.cursor = (
    (isEnabled('crank') && inCircle(x,y,AXLE[0],AXLE[1])) ||
    (isEnabled('pick')  && inCircle(x,y,PICK_BTN[0],PICK_BTN[1])) ||
    (isEnabled('scene') && inCircle(x,y,SCENE_BTN[0],SCENE_BTN[1]))
  ) ? 'pointer' : 'default';
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  handleInputDown(e);
}, { passive: false });
canvas.addEventListener('touchend',    e => { e.preventDefault(); handleInputUp(); }, { passive: false });
canvas.addEventListener('touchcancel', handleInputUp);

document.addEventListener('keydown', e => { if (e.key === 'Shift') shiftHeld = true; });
document.addEventListener('keyup',   e => { if (e.key === 'Shift') shiftHeld = false; });

requestAnimationFrame(draw);
</script>
</body>
</html>
